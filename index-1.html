<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root{
  --bg:#0c0e0d; --bg2:#131614; --bg3:#1b201d; --line:#262b27; --line2:#343d38;
  --txt:#e9efea; --txt2:#8b968f; --txt3:#5e6a63;
  --mint:#4ade80; --coral:#fb7185; --gold:#f5b942; --blue:#609cf6;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;}
body{
  background:radial-gradient(900px 500px at 80% -8%,#16201b 0%,var(--bg) 55%) no-repeat;
  background-color:var(--bg); min-height:100vh;
  color:var(--txt); font-family:'IBM Plex Sans KR',sans-serif;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1180px;margin:0 auto;padding:0 16px;}
.mono{font-family:'IBM Plex Mono',monospace;}
.fade{animation:fade .35s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
header{padding-top:calc(18px + env(safe-area-inset-top));}
.brand{font-size:19px;font-weight:800;letter-spacing:-.02em;}
.brand b{color:var(--mint);}
.tagline{font-size:11px;color:var(--txt3);font-weight:500;margin-left:8px;}
.pills{display:flex;gap:7px;margin-top:15px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none;}
.pills::-webkit-scrollbar{display:none;}
.pill{background:var(--bg2);border:1px solid var(--line);color:var(--txt2);
  padding:8px 15px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;
  white-space:nowrap;font-family:inherit;transition:.15s;}
.pill:hover{color:var(--txt);}
.pill.on{background:var(--mint);color:#06140c;border-color:var(--mint);}
.pill.add{background:transparent;border:1px dashed var(--line2);color:var(--txt3);font-size:12px;}
.pill.add:hover{color:var(--mint);border-color:var(--mint);}
.subtabs{display:flex;gap:2px;margin:20px 0 4px;border-bottom:1px solid var(--line);}
.subtab{background:none;border:none;color:var(--txt3);font-family:inherit;font-size:13px;
  font-weight:600;padding:9px 14px;cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-1px;transition:.15s;}
.subtab:hover{color:var(--txt2);}
.subtab.on{color:var(--txt);border-bottom-color:var(--mint);}
.row{display:flex;align-items:center;}
.sectionbar{display:flex;align-items:center;justify-content:space-between;margin:26px 0 12px;}
.sectionbar h3{margin:0;font-size:14px;font-weight:700;letter-spacing:-.01em;}
.tick{width:4px;height:14px;background:var(--mint);border-radius:2px;display:inline-block;margin-right:8px;
  vertical-align:-1px;}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:620px){.metrics{grid-template-columns:repeat(2,1fr);}}
.metric{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px 15px;}
.metric .ml{color:var(--txt3);font-size:11px;letter-spacing:.04em;font-weight:600;}
.metric .mv{font-family:'IBM Plex Mono',monospace;font-size:21px;font-weight:600;margin-top:6px;line-height:1.1;}
.metric .ms{color:var(--txt3);font-size:11px;margin-top:4px;font-family:'IBM Plex Mono',monospace;}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:16px;margin-top:12px;}
.input{background:var(--bg3);border:1px solid var(--line);border-radius:7px;padding:6px 9px;
  font-size:13px;font-family:'IBM Plex Mono',monospace;outline:none;transition:.15s;color:var(--txt);}
.input.t{font-family:'IBM Plex Sans KR',sans-serif;}
.input:focus{border-color:var(--mint);background:#1f2521;}
.input::placeholder{color:var(--txt3);}
.titleinput{background:none;border:none;border-bottom:1px solid transparent;color:var(--txt);
  font-size:20px;font-weight:800;font-family:inherit;outline:none;padding:2px 0;letter-spacing:-.02em;}
.titleinput:focus{border-bottom-color:var(--mint);}
.tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;}
table{width:100%;border-collapse:collapse;min-width:600px;}
th{background:var(--bg2);color:var(--txt3);font-size:11px;font-weight:600;text-align:right;
  padding:10px 12px;letter-spacing:.03em;border-bottom:1px solid var(--line);white-space:nowrap;}
td{padding:9px 12px;text-align:right;font-size:13px;border-bottom:1px solid var(--line);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
td.num{font-family:'IBM Plex Mono',monospace;}
td.dim{color:var(--txt2);}
tr.total td{background:var(--bg2);font-weight:700;color:var(--txt);
  font-family:'IBM Plex Mono',monospace;border-top:1px solid var(--line2);}
tr.total td.lbl{font-family:'IBM Plex Sans KR';}
.badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px;font-family:'IBM Plex Sans KR';}
.badge.buy{background:rgba(251,113,133,.15);color:var(--coral);}
.badge.sell{background:rgba(74,222,128,.15);color:var(--mint);}
.x{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:12px;padding:4px;transition:.15s;}
.x:hover{color:var(--coral);}
.btn{background:var(--mint);color:#06140c;border:none;border-radius:9px;padding:10px 18px;
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.btn:hover{background:#6ee79a;}
.btn:disabled{background:var(--line2);color:var(--txt3);cursor:not-allowed;}
.ghost{background:var(--bg3);color:var(--txt2);border:1px solid var(--line);border-radius:8px;
  padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;}
.ghost:hover{color:var(--txt);border-color:var(--line2);}
.accrow{display:flex;align-items:center;gap:14px;width:100%;background:var(--bg2);
  border:1px solid var(--line);border-radius:11px;padding:14px 16px;cursor:pointer;
  font-family:inherit;transition:.15s;text-align:left;}
.accrow:hover{border-color:var(--mint);background:#161b18;}
.legrow{display:flex;align-items:center;gap:8px;padding:4px 0;}

.lbl{font-size:11px;color:var(--txt3);font-weight:600;margin-bottom:4px;}

.divider{height:34px;width:1px;background:var(--line);}
</style>
</head>
<body>
<div class="wrap"><header>
  <div class="row" style="align-items:baseline">
    <span class="brand">리밸런<b>서</b></span>
    <span class="tagline">적립식 리밸런싱 포트폴리오 관리</span>
  </div>
  <div class="pills" id="pills"></div>
</header></div>
<div class="wrap"><main id="app"></main></div>
<input type="file" id="importer" accept="application/json" style="display:none">

<script>
"use strict";
/* ===================== 유틸 ===================== */
var C={mint:"#4ade80",coral:"#fb7185",gold:"#f5b942",blue:"#609cf6",
  txt:"#e9efea",txt2:"#8b968f",txt3:"#5e6a63",line:"#262b27",bg3:"#1b201d"};
var SLICE=["#4ade80","#609cf6","#f5b942","#fb7185","#a78bfa","#22d3ee"];
function uid(){return Math.random().toString(36).slice(2,9);}
function won(n){return Math.round(n||0).toLocaleString("ko-KR");}
function pct(n){return (n>=0?"+":"")+(n*100).toFixed(2)+"%";}
function pct0(n){return (n*100).toFixed(1)+"%";}
function todayStr(){return new Date().toISOString().slice(0,10);}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});}
function num(v){var d=String(v).replace(/[^0-9.]/g,"");var n=parseFloat(d);return isNaN(n)?0:n;}
function monthsBetween(from){var a=new Date(from),b=new Date();
  var m=(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth());
  if(b.getDate()<a.getDate())m-=1;return Math.max(m,0);}
function daysBetween(from){return Math.max((new Date()-new Date(from))/86400000,1);}
function el(id){return document.getElementById(id);}
function setT(id,text,color){var e=el(id);if(!e)return;e.textContent=text;if(color)e.style.color=color;}

/* ===================== 초기 데이터 ===================== */
function seed(){
  function cs(rows){return rows.map(function(r){return {id:uid(),date:r[0],memo:r[1],amount:r[2]};});}
  return {prices:{"000001":10000,"000002":20000},accounts:[
    {id:uid(),name:"예시 계좌",cash:50000,holdings:[
      {id:uid(),code:"000001",name:"예시 종목 A",avg:9000,qty:100,weight:60,memo:""},
      {id:uid(),code:"000002",name:"예시 종목 B",avg:18000,qty:50,weight:40,memo:""}],
     contributions:cs([["2025-01-02","초기 납입",2000000],
      ["2025-02-03","",300000],["2025-03-03","",300000]])}
  ]};
}

/* ===================== 계산 ===================== */
function calcAccount(acc,prices){
  var rows=acc.holdings.map(function(h){
    var price=prices[h.code]||0,cost=h.avg*h.qty,value=price*h.qty;
    return {h:h,price:price,cost:cost,value:value,ret:cost>0?value/cost-1:0};});
  var stockValue=rows.reduce(function(s,r){return s+r.value;},0);
  var stockCost=rows.reduce(function(s,r){return s+r.cost;},0);
  rows.forEach(function(r){r.share=stockValue>0?r.value/stockValue:0;});
  var totalAsset=stockValue+acc.cash;
  var sorted=acc.contributions.slice().sort(function(a,b){return a.date<b.date?-1:1;});
  var contributed=sorted.reduce(function(s,c){return s+c.amount;},0);
  var pnl=totalAsset-contributed;
  var totalRet=contributed>0?pnl/contributed:0;
  var first=sorted[0]?sorted[0].date:null;
  var months=first?monthsBetween(first):0;
  var days=first?daysBetween(first):1;
  var cagr=(first&&contributed>0&&totalAsset>0)?Math.pow(totalAsset/contributed,365/days)-1:0;
  return {rows:rows,stockValue:stockValue,stockCost:stockCost,totalAsset:totalAsset,
    contributed:contributed,pnl:pnl,totalRet:totalRet,months:months,cagr:cagr,first:first,sorted:sorted};
}
function calcRebalance(acc,prices,stat,addMoney){
  var base=stat.stockValue+acc.cash+(addMoney||0);
  var wsum=acc.holdings.reduce(function(s,h){return s+(h.weight||0);},0);
  var rows=acc.holdings.map(function(h){
    var price=prices[h.code]||0;
    var targetAmt=base*((h.weight||0)/100);
    var targetQty=price>0?Math.round(targetAmt/price):0;
    var adjQty=targetQty-h.qty;
    return {h:h,price:price,targetAmt:targetAmt,targetQty:targetQty,adjQty:adjQty,tradeAmt:adjQty*price};});
  var invested=rows.reduce(function(s,r){return s+r.targetQty*r.price;},0);
  return {base:base,wsum:wsum,rows:rows,invested:invested,leftover:base-invested};
}

/* ===================== 차트 (SVG) ===================== */
function donutSVG(segs,size){
  size=size||170;var th=size*0.26,r=(size-th)/2,cx=size/2,circ=2*Math.PI*r;
  var total=segs.reduce(function(s,x){return s+x.value;},0)||1,off=0,out="";
  segs.forEach(function(s){
    var len=s.value/total*circ;
    out+='<circle cx="'+cx+'" cy="'+cx+'" r="'+r+'" fill="none" stroke="'+s.color
      +'" stroke-width="'+th+'" stroke-dasharray="'+Math.max(len-2,0)+' '+(circ-Math.max(len-2,0))
      +'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 '+cx+' '+cx+')"/>';
    off+=len;});
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+out+'</svg>';
}
function areaSVG(data){
  if(data.length<2)return '<div class="note" style="padding:20px">데이터가 2건 이상이면 그래프가 표시됩니다.</div>';
  var W=620,H=180,pl=46,pr=14,pt=12,pb=24,iw=W-pl-pr,ih=H-pt-pb,n=data.length;
  var max=Math.max.apply(null,data.map(function(d){return d.value;}))||1;
  function X(i){return pl+i/(n-1)*iw;}
  function Y(v){return pt+ih-v/max*ih;}
  var line=data.map(function(d,i){return (i?"L":"M")+X(i).toFixed(1)+" "+Y(d.value).toFixed(1);}).join(" ");
  var area=line+" L"+X(n-1).toFixed(1)+" "+(pt+ih)+" L"+X(0).toFixed(1)+" "+(pt+ih)+" Z";
  var grid="";
  for(var k=0;k<=2;k++){var v=max*k/2,y=Y(v);
    grid+='<line x1="'+pl+'" y1="'+y+'" x2="'+(W-pr)+'" y2="'+y+'" stroke="'+C.line+'"/>'
      +'<text x="'+(pl-6)+'" y="'+(y+3)+'" fill="'+C.txt3+'" font-size="10" text-anchor="end" font-family="IBM Plex Mono">'
      +(v/1000000).toFixed(0)+'M</text>';}
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block">'
    +'<defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0%" stop-color="'+C.mint+'" stop-opacity="0.32"/>'
    +'<stop offset="100%" stop-color="'+C.mint+'" stop-opacity="0"/></linearGradient></defs>'
    +grid+'<path d="'+area+'" fill="url(#ag)"/>'
    +'<path d="'+line+'" fill="none" stroke="'+C.mint+'" stroke-width="2"/>'
    +'<text x="'+X(0)+'" y="'+(H-7)+'" fill="'+C.txt3+'" font-size="10" font-family="IBM Plex Mono">'+esc(data[0].label)+'</text>'
    +'<text x="'+X(n-1)+'" y="'+(H-7)+'" fill="'+C.txt3+'" font-size="10" text-anchor="end" font-family="IBM Plex Mono">'+esc(data[n-1].label)+'</text>'
    +'</svg>';
}

/* ===================== 상태 ===================== */
var STORE="rebalancer:v3";
var state=null;
var ui={view:"overview",accId:null,tab:"port",addMoney:0};
var saveTimer=null;
function load(){try{var r=localStorage.getItem(STORE);if(r)return JSON.parse(r);}catch(e){}return null;}
function save(){clearTimeout(saveTimer);saveTimer=setTimeout(function(){
  try{localStorage.setItem(STORE,JSON.stringify(state));}catch(e){}},400);}
function activeAcc(){return state.accounts.filter(function(a){return a.id===ui.accId;})[0];}

/* ===================== 렌더: 빌더 ===================== */
function metricHTML(label,value,tone,sub){
  var col=tone==="pos"?C.mint:tone==="neg"?C.coral:tone==="gold"?C.gold:C.txt;
  return '<div class="metric"><div class="ml">'+esc(label)+'</div>'
    +'<div class="mv" style="color:'+col+'">'+esc(value)+'</div>'
    +(sub?'<div class="ms">'+esc(sub)+'</div>':'')+'</div>';
}
function bar(label,right){
  return '<div class="sectionbar"><h3><span class="tick"></span>'+esc(label)+'</h3>'
    +'<div>'+(right||"")+'</div></div>';
}

function buildPills(){
  var h='<button class="pill'+(ui.view==="overview"?" on":"")+'" data-act="view" data-view="overview">전체</button>';
  state.accounts.forEach(function(a){
    h+='<button class="pill'+(ui.view==="account"&&ui.accId===a.id?" on":"")
      +'" data-act="view" data-view="account" data-id="'+a.id+'">'+esc(a.name)+'</button>';});
  h+='<button class="pill add" data-act="add-acc">+ 계좌</button>';
  el("pills").innerHTML=h;
}

function portMetricsHTML(stat){
  return metricHTML("총 평가자산","₩"+won(stat.totalAsset),null,"주식 ₩"+won(stat.stockValue))
    +metricHTML("총 손익","₩"+won(stat.pnl),stat.pnl>=0?"pos":"neg","납입 ₩"+won(stat.contributed))
    +metricHTML("총 수익률",pct(stat.totalRet),stat.totalRet>=0?"pos":"neg")
    +metricHTML("연 환산 수익률",pct0(stat.cagr),"gold","투자 "+stat.months+"개월");
}
function legendHTML(stat){
  var h="";
  stat.rows.filter(function(r){return r.value>0;}).forEach(function(r,i){
    h+='<div class="legrow"><span class="dot" style="background:'+SLICE[i%SLICE.length]+'"></span>'
      +'<span style="font-size:13px;color:'+C.txt2+';flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'
      +esc(r.h.name||r.h.code)+'</span>'
      +'<span class="mono" style="font-size:13px">'+pct0(r.share)+'</span></div>';});
  return h;
}
function donutSegs(stat){
  return stat.rows.filter(function(r){return r.value>0;}).map(function(r,i){
    return {value:r.value,color:SLICE[i%SLICE.length]};});
}

/* ---- 전체 화면 ---- */
function viewOverview(){
  var stats=state.accounts.map(function(a){return {a:a,s:calcAccount(a,state.prices)};});
  var tA=stats.reduce(function(s,x){return s+x.s.totalAsset;},0);
  var tC=stats.reduce(function(s,x){return s+x.s.contributed;},0);
  var tP=tA-tC,tR=tC>0?tP/tC:0;
  var segs=[],leg="";
  stats.filter(function(x){return x.s.totalAsset>0;}).forEach(function(x,i){
    var col=SLICE[i%SLICE.length];
    segs.push({value:x.s.totalAsset,color:col});
    leg+='<div class="legrow"><span class="dot" style="background:'+col+'"></span>'
      +'<span style="font-size:13px;color:'+C.txt2+';flex:1">'+esc(x.a.name)+'</span>'
      +'<span class="mono" style="font-size:13px">'+pct0(x.s.totalAsset/(tA||1))+'</span></div>';});
  var accs="";
  stats.forEach(function(x){
    accs+='<button class="accrow" data-act="open-acc" data-id="'+x.a.id+'">'
      +'<div style="min-width:108px"><div style="font-weight:700;font-size:14px">'+esc(x.a.name)+'</div>'
      +'<div style="font-size:11px;color:'+C.txt3+'">'+x.a.holdings.length+'종목 · '+x.s.months+'개월</div></div>'
      +'<div style="text-align:right;flex:1">'
      +'<div class="mono" style="font-size:15px">₩'+won(x.s.totalAsset)+'</div>'
      +'<div class="mono" style="font-size:12px;color:'+(x.s.pnl>=0?C.mint:C.coral)+'">'
      +pct(x.s.totalRet)+' · 연 '+pct0(x.s.cagr)+'</div></div></button>';});
  return '<div class="fade">'
    +bar("전체 자산 요약")
    +'<div class="metrics">'
    +metricHTML("총 평가자산","₩"+won(tA))
    +metricHTML("총 납입금","₩"+won(tC))
    +metricHTML("총 손익","₩"+won(tP),tP>=0?"pos":"neg")
    +metricHTML("총 수익률",pct(tR),tR>=0?"pos":"neg")
    +'</div>'
    +'<div class="card" style="display:flex;flex-wrap:wrap;gap:18px;align-items:center">'
    +'<div style="flex-shrink:0">'+donutSVG(segs,190)+'</div>'
    +'<div style="flex:1;min-width:230px">'
    +'<div class="lbl">계좌별 비중</div>'+leg+'</div></div>'
    +bar("계좌별 현황")
    +'<div style="display:grid;gap:10px">'+accs+'</div>'
    +foot()
    +'</div>';
}

/* ---- 포트폴리오 탭 ---- */
function viewPort(acc){
  var stat=calcAccount(acc,state.prices);
  var rows="";
  stat.rows.forEach(function(r){
    var h=r.h;
    rows+='<tr>'
      +'<td style="text-align:left">'
      +'<input class="input t" data-edit="h-name" data-id="'+h.id+'" value="'+esc(h.name)+'" placeholder="상품명" style="width:150px">'
      +'<div style="margin-top:4px"><input class="input" data-edit="h-code" data-id="'+h.id+'" value="'+esc(h.code)+'" placeholder="종목코드" style="width:150px"></div>'
      +'<div style="margin-top:4px"><input class="input t" data-edit="h-memo" data-id="'+h.id+'" value="'+esc(h.memo||"")+'" placeholder="메모 (선택)" style="width:150px;font-size:11px"></div></td>'
      +'<td><input class="input" data-edit="h-avg" data-id="'+h.id+'" inputmode="decimal" value="'+won(h.avg)+'" style="width:80px;text-align:right"></td>'
      +'<td><input class="input" data-edit="h-qty" data-id="'+h.id+'" inputmode="decimal" value="'+won(h.qty)+'" style="width:72px;text-align:right"></td>'
      +'<td class="num dim" id="c_'+h.id+'_cost">'+won(r.cost)+'</td>'
      +'<td><input class="input" data-edit="price" data-code="'+esc(h.code)+'" inputmode="decimal" value="'+won(r.price)+'" style="width:80px;text-align:right"></td>'
      +'<td class="num" id="c_'+h.id+'_val">'+won(r.value)+'</td>'
      +'<td class="num" id="c_'+h.id+'_ret" style="color:'+(r.ret>=0?C.mint:C.coral)+'">'+pct(r.ret)+'</td>'
      +'<td class="num dim" id="c_'+h.id+'_shr">'+pct0(r.share)+'</td>'
      +'<td><button class="x" data-act="del-h" data-id="'+h.id+'">✕</button></td></tr>';});
  var tret=stat.stockCost?(stat.stockValue/stat.stockCost-1):0;
  return '<div class="fade">'
    +'<div class="row" style="gap:8px;margin-top:14px">'
    +'<input class="titleinput" data-edit="acc-name" value="'+esc(acc.name)+'">'
    +'<button class="ghost" data-act="del-acc">계좌 삭제</button></div>'
    +'<div class="metrics" id="m_port" style="margin-top:14px">'+portMetricsHTML(stat)+'</div>'
    +'<div class="card" style="display:flex;flex-wrap:wrap;gap:20px;align-items:center">'
    +'<div id="d_port" style="flex-shrink:0">'+donutSVG(donutSegs(stat),170)+'</div>'
    +'<div style="flex:1;min-width:220px">'
    +'<div class="lbl">현재 포트폴리오 비중</div>'
    +'<div id="lg_port">'+legendHTML(stat)+'</div>'
    +'<div class="legrow" style="margin-top:10px;padding-top:10px;border-top:1px solid '+C.line+'">'
    +'<span style="font-size:13px;color:'+C.txt2+';flex:1">예수금 (현금)</span>'
    +'<input class="input" data-edit="cash" inputmode="decimal" value="'+won(acc.cash)+'" style="width:110px;text-align:right">'
    +'<span style="color:'+C.txt3+';font-size:12px">원</span></div></div></div>'
    +bar("보유 종목",'<button class="ghost" data-act="add-h">+ 종목 추가</button>')
    +'<div class="tablewrap"><table><thead><tr>'
    +'<th style="text-align:left;min-width:150px">종목</th><th>매입단가</th><th>보유수량</th>'
    +'<th>매입금액</th><th>현재가</th><th>평가금액</th><th>수익률</th><th>비중</th><th></th>'
    +'</tr></thead><tbody>'+rows
    +'<tr class="total"><td class="lbl" style="text-align:left">합계</td><td></td><td></td>'
    +'<td class="num" id="c_t_cost">'+won(stat.stockCost)+'</td><td></td>'
    +'<td class="num" id="c_t_val">'+won(stat.stockValue)+'</td>'
    +'<td class="num" id="c_t_ret" style="color:'+(tret>=0?C.mint:C.coral)+'">'+pct(tret)+'</td>'
    +'<td class="num">100%</td><td></td></tr>'
    +'</tbody></table></div>'
    +'<p class="note" style="margin-top:8px">같은 종목코드는 모든 계좌에서 현재가가 공유됩니다. 매월 시세만 갱신하면 됩니다.</p>'
    +'</div>';
}
function softPort(acc){
  var stat=calcAccount(acc,state.prices);
  if(el("m_port"))el("m_port").innerHTML=portMetricsHTML(stat);
  if(el("d_port"))el("d_port").innerHTML=donutSVG(donutSegs(stat),170);
  if(el("lg_port"))el("lg_port").innerHTML=legendHTML(stat);
  stat.rows.forEach(function(r){
    setT("c_"+r.h.id+"_cost",won(r.cost));
    setT("c_"+r.h.id+"_val",won(r.value));
    setT("c_"+r.h.id+"_ret",pct(r.ret),r.ret>=0?C.mint:C.coral);
    setT("c_"+r.h.id+"_shr",pct0(r.share));});
  var tret=stat.stockCost?(stat.stockValue/stat.stockCost-1):0;
  setT("c_t_cost",won(stat.stockCost));
  setT("c_t_val",won(stat.stockValue));
  setT("c_t_ret",pct(tret),tret>=0?C.mint:C.coral);
}

/* ---- 리밸런싱 탭 ---- */
function adjCellHTML(adj){
  if(adj===0)return '<span style="color:'+C.txt3+'">—</span>';
  return '<span class="badge '+(adj>0?"buy":"sell")+'">'+(adj>0?"매수":"매도")+' '+Math.abs(adj)+'</span>';
}
function viewRebal(acc){
  var stat=calcAccount(acc,state.prices);
  var rb=calcRebalance(acc,state.prices,stat,ui.addMoney);
  var off=Math.abs(rb.wsum-100)>0.5;
  var rows="";
  rb.rows.forEach(function(r){
    var h=r.h;
    rows+='<tr>'
      +'<td style="text-align:left"><div style="font-size:13px;font-weight:500">'+esc(h.name||"—")+'</div>'
      +'<div class="mono" style="font-size:11px;color:'+C.txt3+'">'+esc(h.code)+'</div></td>'
      +'<td><input class="input" data-edit="weight" data-id="'+h.id+'" inputmode="decimal" value="'+(h.weight||0)+'" style="width:50px;text-align:right"><span style="color:'+C.txt3+';font-size:12px">%</span></td>'
      +'<td class="num dim" id="r_'+h.id+'_amt">'+won(r.targetAmt)+'</td>'
      +'<td class="num dim">'+won(r.price)+'</td>'
      +'<td class="num dim">'+won(h.qty)+'</td>'
      +'<td class="num" id="r_'+h.id+'_tq" style="font-weight:600">'+won(r.targetQty)+'</td>'
      +'<td class="num" id="r_'+h.id+'_adj">'+adjCellHTML(r.adjQty)+'</td>'
      +'<td class="num" id="r_'+h.id+'_trd" style="color:'+(r.adjQty>0?C.coral:r.adjQty<0?C.mint:C.txt3)+'">'
      +(r.adjQty===0?"—":(r.tradeAmt>0?"−":"+")+won(Math.abs(r.tradeAmt)))+'</td></tr>';});
  return '<div class="fade">'
    +bar("리밸런싱 계산기")
    +'<div class="card" style="display:flex;flex-wrap:wrap;gap:18px;align-items:center">'
    +'<div><div class="lbl">이번에 추가 납입할 금액</div>'
    +'<input class="input" data-edit="addmoney" inputmode="decimal" value="'+won(ui.addMoney)+'" style="width:130px;text-align:right"><span style="color:'+C.txt3+';font-size:12px">원</span></div>'
    +'<div class="divider"></div>'
    +'<div><div class="lbl">리밸런싱 대상 금액</div>'
    +'<div class="mono" id="r_base" style="font-size:18px;color:'+C.mint+';margin-top:3px">₩'+won(rb.base)+'</div>'
    +'<div class="note" id="r_baseinfo">평가액 '+won(stat.stockValue)+' + 현금 '+won(acc.cash)
    +(ui.addMoney>0?' + 추가 '+won(ui.addMoney):'')+'</div></div>'
    +'<div style="flex:1"></div>'
    +'<button class="ghost" data-act="equalize">균등 배분</button></div>'
    +bar("목표 배분",'<span class="mono" id="r_wsum" style="font-size:12px;color:'+(off?C.coral:C.mint)+'">비중 합계 '+rb.wsum.toFixed(1)+'%</span>')
    +'<div class="tablewrap"><table><thead><tr>'
    +'<th style="text-align:left;min-width:120px">종목</th><th>목표비중</th><th>목표금액</th>'
    +'<th>현재가</th><th>현재수량</th><th>목표수량</th><th>조정</th><th>거래금액</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table></div>'
    +'<div class="card" style="display:flex;flex-wrap:wrap;gap:16px;align-items:center">'
    +'<div><div class="lbl">리밸런싱 후 잔여 현금</div>'
    +'<div class="mono" id="r_left" style="font-size:16px;margin-top:3px;color:'+(rb.leftover<0?C.coral:C.txt)+'">₩'+won(rb.leftover)+'</div></div>'
    +'<div style="flex:1"></div>'
    +'<button class="btn" id="r_apply" data-act="apply-rebal"'+(off?" disabled":"")+'>리밸런싱 실행 →</button></div>'
    +'<p class="note" style="margin-top:8px">실행하면 보유수량이 목표수량으로 바뀌고, 매수분만큼 평균단가가 재계산되며, 잔여 현금이 예수금으로 반영됩니다. 추가 납입액을 입력했다면 납입 내역에도 자동 기록됩니다.</p>'
    +'</div>';
}
function softRebal(acc){
  var stat=calcAccount(acc,state.prices);
  var rb=calcRebalance(acc,state.prices,stat,ui.addMoney);
  var off=Math.abs(rb.wsum-100)>0.5;
  setT("r_base","₩"+won(rb.base));
  if(el("r_baseinfo"))el("r_baseinfo").textContent="평가액 "+won(stat.stockValue)+" + 현금 "+won(acc.cash)
    +(ui.addMoney>0?" + 추가 "+won(ui.addMoney):"");
  setT("r_wsum","비중 합계 "+rb.wsum.toFixed(1)+"%",off?C.coral:C.mint);
  setT("r_left","₩"+won(rb.leftover),rb.leftover<0?C.coral:C.txt);
  rb.rows.forEach(function(r){
    setT("r_"+r.h.id+"_amt",won(r.targetAmt));
    setT("r_"+r.h.id+"_tq",won(r.targetQty));
    if(el("r_"+r.h.id+"_adj"))el("r_"+r.h.id+"_adj").innerHTML=adjCellHTML(r.adjQty);
    setT("r_"+r.h.id+"_trd",r.adjQty===0?"—":(r.tradeAmt>0?"−":"+")+won(Math.abs(r.tradeAmt)),
      r.adjQty>0?C.coral:r.adjQty<0?C.mint:C.txt3);});
  if(el("r_apply"))el("r_apply").disabled=off;
}

/* ---- 납입 내역 탭 ---- */
function viewContrib(acc){
  var stat=calcAccount(acc,state.prices);
  var sorted=stat.sorted;
  var total=stat.contributed;
  var run=0,chart=sorted.map(function(c){run+=c.amount;return {label:c.date.slice(2),value:run};});
  var rows="";
  sorted.slice().reverse().forEach(function(c){
    rows+='<tr><td class="num" style="text-align:left;color:'+C.txt2+'">'+esc(c.date)+'</td>'
      +'<td style="text-align:left;color:'+C.txt2+'">'+esc(c.memo||"—")+'</td>'
      +'<td class="num">'+won(c.amount)+'</td>'
      +'<td><button class="x" data-act="del-c" data-id="'+c.id+'">✕</button></td></tr>';});
  if(!rows)rows='<tr><td colspan="4" style="color:'+C.txt3+';padding:20px">납입 내역이 없습니다.</td></tr>';
  return '<div class="fade">'
    +bar("납입 내역")
    +'<div class="metrics">'
    +metricHTML("총 납입금","₩"+won(total))
    +metricHTML("납입 횟수",sorted.length+"회")
    +metricHTML("평균 납입액","₩"+won(sorted.length?total/sorted.length:0))
    +metricHTML("첫 납입일",sorted[0]?sorted[0].date:"—")
    +'</div>'
    +'<div class="card"><div class="lbl">누적 납입금</div>'+areaSVG(chart)+'</div>'
    +bar("납입 추가")
    +'<div class="card" style="display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end">'
    +'<div><div class="lbl">날짜</div><input class="input t" type="date" id="c_date" value="'+todayStr()+'" style="width:150px"></div>'
    +'<div><div class="lbl">내용</div><input class="input t" id="c_memo" placeholder="예: 정기 납입" style="width:150px"></div>'
    +'<div><div class="lbl">납입액</div><input class="input" id="c_amount" inputmode="decimal" placeholder="0" style="width:130px;text-align:right"></div>'
    +'<button class="btn" data-act="add-c" style="margin-left:auto">+ 추가</button></div>'
    +'<div class="tablewrap" style="margin-top:14px"><table><thead><tr>'
    +'<th style="text-align:left">날짜</th><th style="text-align:left">내용</th><th>납입액</th><th></th>'
    +'</tr></thead><tbody>'+rows
    +'<tr class="total"><td class="lbl" style="text-align:left">계</td><td></td>'
    +'<td class="num">'+won(total)+'</td><td></td></tr>'
    +'</tbody></table></div></div>';
}

/* ---- 공통 푸터 ---- */
function foot(){
  return '<div class="foot">'
    +'<button class="ghost" data-act="export">백업 저장 (.json)</button>'
    +'<button class="ghost" data-act="import">백업 불러오기</button>'
    +'<button class="ghost" data-act="reset">초기 데이터로 재설정</button>'
    +'<div style="flex:1"></div>'
    +'<span class="note" style="align-self:center">데이터는 이 브라우저에 자동 저장됩니다</span></div>';
}

/* ===================== 메인 렌더 ===================== */
function render(){
  buildPills();
  var app=el("app"),html="";
  if(ui.view==="overview"){html=viewOverview();}
  else{
    var acc=activeAcc();
    if(!acc){ui.view="overview";return render();}
    var st=function(k,label){return '<button class="subtab'+(ui.tab===k?" on":"")
      +'" data-act="tab" data-tab="'+k+'">'+label+'</button>';};
    html='<div class="subtabs">'+st("port","포트폴리오")+st("rebal","리밸런싱")+st("contrib","납입 내역")+'</div>';
    if(ui.tab==="port")html+=viewPort(acc);
    else if(ui.tab==="rebal")html+=viewRebal(acc);
    else html+=viewContrib(acc);
    if(ui.tab==="contrib")html+=foot();
  }
  app.innerHTML=html;
}
function softRefresh(){
  if(ui.view!=="account")return;
  var acc=activeAcc();if(!acc)return;
  if(ui.tab==="port")softPort(acc);
  else if(ui.tab==="rebal")softRebal(acc);
}

/* ===================== 이벤트 ===================== */
function patch(fn){fn();save();}
function applyRebalance(acc){
  var stat=calcAccount(acc,state.prices);
  var rb=calcRebalance(acc,state.prices,stat,ui.addMoney);
  if(Math.abs(rb.wsum-100)>0.5){alert("목표 비중 합계가 100%가 아닙니다.");return;}
  var msg="리밸런싱을 실행하면 보유수량·평균단가·예수금이 갱신됩니다.\n"
    +(ui.addMoney>0?"추가 납입 ₩"+won(ui.addMoney)+" 도 납입 내역에 기록됩니다.\n":"")
    +"계속할까요?";
  if(!confirm(msg))return;
  rb.rows.forEach(function(r){
    var h=r.h,delta=r.adjQty;
    if(delta>0){var nq=h.qty+delta;h.avg=Math.round(nq>0?(h.qty*h.avg+delta*r.price)/nq:r.price);}
    h.qty=r.targetQty;});
  acc.cash=Math.round(rb.leftover);
  if(ui.addMoney>0)acc.contributions.push({id:uid(),date:todayStr(),memo:"리밸런싱 납입",amount:ui.addMoney});
  ui.addMoney=0;
  save();render();
  alert("리밸런싱이 적용되었습니다.");
}
function exportData(){
  var blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="rebalancer-backup-"+todayStr()+".json";
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(function(){URL.revokeObjectURL(a.href);},1500);
}

el("app").addEventListener("click",function(e){
  var t=e.target.closest("[data-act]");if(!t)return;
  var act=t.getAttribute("data-act");
  var acc=activeAcc();
  if(act==="tab"){ui.tab=t.getAttribute("data-tab");render();}
  else if(act==="open-acc"){ui.view="account";ui.accId=t.getAttribute("data-id");ui.tab="port";ui.addMoney=0;render();}
  else if(act==="del-acc"){
    if(confirm("이 계좌를 삭제할까요? 되돌릴 수 없습니다.")){
      patch(function(){state.accounts=state.accounts.filter(function(a){return a.id!==ui.accId;});});
      ui.view="overview";render();}}
  else if(act==="add-h"){patch(function(){
    acc.holdings.push({id:uid(),code:"",name:"새 종목",avg:0,qty:0,weight:0,memo:""});});render();}
  else if(act==="del-h"){var hid=t.getAttribute("data-id");
    patch(function(){acc.holdings=acc.holdings.filter(function(h){return h.id!==hid;});});render();}
  else if(act==="equalize"){var n=acc.holdings.length||1;var w=Math.round(1000/n)/10;
    patch(function(){acc.holdings.forEach(function(h){h.weight=w;});});render();}
  else if(act==="apply-rebal"){applyRebalance(acc);}
  else if(act==="add-c"){
    var d=el("c_date").value,m=el("c_memo").value,am=num(el("c_amount").value);
    if(!d||!am){alert("날짜와 금액을 입력하세요.");return;}
    patch(function(){acc.contributions.push({id:uid(),date:d,memo:m,amount:am});});render();}
  else if(act==="del-c"){var cid=t.getAttribute("data-id");
    patch(function(){acc.contributions=acc.contributions.filter(function(c){return c.id!==cid;});});render();}
  else if(act==="add-acc"){
    var name=prompt("새 계좌 이름","새 계좌");if(!name)return;
    var na={id:uid(),name:name,cash:0,holdings:[],contributions:[]};
    patch(function(){state.accounts.push(na);});
    ui.view="account";ui.accId=na.id;ui.tab="port";render();}
  else if(act==="export"){exportData();}
  else if(act==="import"){el("importer").click();}
  else if(act==="reset"){
    if(confirm("모든 데이터를 초기 상태(4개 계좌)로 되돌릴까요?")){
      state=seed();save();ui.view="overview";render();}}
});

/* pills 영역 클릭 */
el("pills").addEventListener("click",function(e){
  var t=e.target.closest("[data-act]");if(!t)return;
  var act=t.getAttribute("data-act");
  if(act==="view"){
    var v=t.getAttribute("data-view");
    if(v==="overview"){ui.view="overview";}
    else{ui.view="account";ui.accId=t.getAttribute("data-id");ui.tab="port";ui.addMoney=0;}
    render();}
  else if(act==="add-acc"){
    var name=prompt("새 계좌 이름","새 계좌");if(!name)return;
    var na={id:uid(),name:name,cash:0,holdings:[],contributions:[]};
    state.accounts.push(na);save();
    ui.view="account";ui.accId=na.id;ui.tab="port";render();}
});

/* 입력값 실시간 반영 (인풋은 다시 그리지 않음 → 포커스 유지) */
el("app").addEventListener("input",function(e){
  var t=e.target;var f=t.getAttribute("data-edit");if(!f)return;
  var acc=activeAcc();
  if(f==="acc-name"&&acc){acc.name=t.value;buildPills();save();return;}
  if(f==="cash"&&acc){acc.cash=num(t.value);save();softRefresh();return;}
  if(f==="addmoney"){ui.addMoney=num(t.value);softRefresh();return;}
  if(f==="price"){
    var code=t.getAttribute("data-code");
    if(code){state.prices[code]=num(t.value);save();softRefresh();}return;}
  if(!acc)return;
  var id=t.getAttribute("data-id");
  var h=acc.holdings.filter(function(x){return x.id===id;})[0];
  if(!h)return;
  if(f==="h-name")h.name=t.value;
  else if(f==="h-code")h.code=t.value;
  else if(f==="h-memo")h.memo=t.value;
  else if(f==="h-avg")h.avg=num(t.value);
  else if(f==="h-qty")h.qty=num(t.value);
  else if(f==="weight")h.weight=num(t.value);
  save();softRefresh();
});

/* 백업 불러오기 */
el("importer").addEventListener("change",function(e){
  var file=e.target.files[0];if(!file)return;
  var rd=new FileReader();
  rd.onload=function(){
    try{
      var data=JSON.parse(rd.result);
      if(!data.accounts||!data.prices)throw 0;
      state=data;save();ui.view="overview";render();
      alert("백업을 불러왔습니다.");
    }catch(err){alert("올바른 백업 파일이 아닙니다.");}
    el("importer").value="";
  };
  rd.readAsText(file);
});

/* ===================== 시작 ===================== */
state=load()||seed();
render();
</script>
</body>
</html>
