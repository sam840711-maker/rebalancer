<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>리밸런서</title>
<meta name="theme-color" content="#0c0e0d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="리밸런서">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root{
  --bg:#0c0e0d; --bg2:#131614; --bg3:#1b201d; --line:#262b27; --line2:#343d38;
  --txt:#e9efea; --txt2:#8b968f; --txt3:#5e6a63;
  --mint:#4ade80; --coral:#fb7185; --gold:#f5b942; --blue:#609cf6;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;}
body{
  background:radial-gradient(900px 500px at 80% -8%,#16201b 0%,var(--bg) 55%) no-repeat;
  background-color:var(--bg); min-height:100vh;
  color:var(--txt); font-family:'IBM Plex Sans KR',sans-serif;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1180px;margin:0 auto;padding:0 16px;}
.mono{font-family:'IBM Plex Mono',monospace;}
.fade{animation:fade .35s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
header{padding-top:calc(18px + env(safe-area-inset-top));}
.brand{font-size:19px;font-weight:800;letter-spacing:-.02em;}
.brand b{color:var(--mint);}
.tagline{font-size:11px;color:var(--txt3);font-weight:500;margin-left:8px;}
.pills{display:flex;gap:7px;margin-top:15px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none;}
.pills::-webkit-scrollbar{display:none;}
.pill{background:var(--bg2);border:1px solid var(--line);color:var(--txt2);
  padding:8px 15px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;
  white-space:nowrap;font-family:inherit;transition:.15s;}
.pill:hover{color:var(--txt);}
.pill.on{background:var(--mint);color:#06140c;border-color:var(--mint);}
.pill.add{background:transparent;border:1px dashed var(--line2);color:var(--txt3);font-size:12px;}
.pill.add:hover{color:var(--mint);border-color:var(--mint);}
.subtabs{display:flex;gap:2px;margin:20px 0 4px;border-bottom:1px solid var(--line);}
.subtab{background:none;border:none;color:var(--txt3);font-family:inherit;font-size:13px;
  font-weight:600;padding:9px 14px;cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-1px;transition:.15s;}
.subtab:hover{color:var(--txt2);}
.subtab.on{color:var(--txt);border-bottom-color:var(--mint);}
.row{display:flex;align-items:center;}
.sectionbar{display:flex;align-items:center;justify-content:space-between;margin:26px 0 12px;}
.sectionbar h3{margin:0;font-size:14px;font-weight:700;letter-spacing:-.01em;}
.tick{width:4px;height:14px;background:var(--mint);border-radius:2px;display:inline-block;margin-right:8px;
  vertical-align:-1px;}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:620px){.metrics{grid-template-columns:repeat(2,1fr);}}
.metric{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px 15px;}
.metric .ml{color:var(--txt3);font-size:11px;letter-spacing:.04em;font-weight:600;}
.metric .mv{font-family:'IBM Plex Mono',monospace;font-size:21px;font-weight:600;margin-top:6px;line-height:1.1;}
.metric .ms{color:var(--txt3);font-size:11px;margin-top:4px;font-family:'IBM Plex Mono',monospace;}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:16px;margin-top:12px;}
.input{background:var(--bg3);border:1px solid var(--line);border-radius:7px;padding:6px 9px;
  font-size:13px;font-family:'IBM Plex Mono',monospace;outline:none;transition:.15s;color:var(--txt);}
.input.t{font-family:'IBM Plex Sans KR',sans-serif;}
.input:focus{border-color:var(--mint);background:#1f2521;}
.input::placeholder{color:var(--txt3);}
.titleinput{background:none;border:none;border-bottom:1px solid transparent;color:var(--txt);
  font-size:20px;font-weight:800;font-family:inherit;outline:none;padding:2px 0;letter-spacing:-.02em;}
.titleinput:focus{border-bottom-color:var(--mint);}
.tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;}
table{width:100%;border-collapse:collapse;min-width:600px;}
th{background:var(--bg2);color:var(--txt3);font-size:11px;font-weight:600;text-align:right;
  padding:10px 12px;letter-spacing:.03em;border-bottom:1px solid var(--line);white-space:nowrap;}
td{padding:9px 12px;text-align:right;font-size:13px;border-bottom:1px solid var(--line);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
td.num{font-family:'IBM Plex Mono',monospace;}
td.dim{color:var(--txt2);}
tr.total td{background:var(--bg2);font-weight:700;color:var(--txt);
  font-family:'IBM Plex Mono',monospace;border-top:1px solid var(--line2);}
tr.total td.lbl{font-family:'IBM Plex Sans KR';}
.badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px;font-family:'IBM Plex Sans KR';}
.badge.buy{background:rgba(251,113,133,.15);color:var(--coral);}
.badge.sell{background:rgba(74,222,128,.15);color:var(--mint);}
.x{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:12px;padding:4px;transition:.15s;}
.x:hover{color:var(--coral);}
.btn{background:var(--mint);color:#06140c;border:none;border-radius:9px;padding:10px 18px;
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.btn:hover{background:#6ee79a;}
.btn:disabled{background:var(--line2);color:var(--txt3);cursor:not-allowed;}
.ghost{background:var(--bg3);color:var(--txt2);border:1px solid var(--line);border-radius:8px;
  padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;}
.ghost:hover{color:var(--txt);border-color:var(--line2);}
.ghost.sm{padding:5px 9px;font-size:12px;}
.ghost:disabled{opacity:.4;cursor:default;}
.accrow{display:flex;align-items:center;gap:14px;width:100%;background:var(--bg2);
  border:1px solid var(--line);border-radius:11px;padding:14px 16px;cursor:pointer;
  font-family:inherit;transition:.15s;text-align:left;}
.accrow:hover{border-color:var(--mint);background:#161b18;}
.legrow{display:flex;align-items:center;gap:8px;padding:4px 0;}
.dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.lbl{font-size:11px;color:var(--txt3);font-weight:600;margin-bottom:4px;}
.note{color:var(--txt3);font-size:11px;line-height:1.6;}
.foot{display:flex;gap:8px;flex-wrap:wrap;margin-top:30px;padding-top:18px;border-top:1px solid var(--line);}
.divider{height:34px;width:1px;background:var(--line);}
.empty{text-align:center;color:var(--txt2);padding:64px 20px;font-size:14px;line-height:1.9;}
.linkbtn{background:none;border:none;color:var(--txt3);font-family:inherit;font-size:11px;cursor:pointer;text-decoration:underline;padding:0;}
.linkbtn:hover{color:var(--mint);}
.codebox-wrap{margin-top:12px;}
.codebox{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--txt2);overflow-x:auto;white-space:pre;line-height:1.5;margin:0;}
.ycard{background:var(--bg2);border:1px solid var(--line);border-radius:12px;margin-top:10px;overflow:hidden;}
.yhead{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;padding:15px 16px;cursor:pointer;font-family:inherit;text-align:left;transition:.12s;}
.yhead:hover{background:var(--bg3);}
.ychev{color:var(--txt3);font-size:11px;width:12px;flex-shrink:0;}
.yname{font-size:15px;font-weight:700;letter-spacing:-.01em;color:var(--txt);}
.ytotal{font-size:15px;color:var(--mint);font-weight:600;margin-left:auto;}
.mgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px 14px;padding:8px 16px 16px;border-top:1px solid var(--line);}
.mrow{display:flex;align-items:center;gap:8px;min-width:0;}
.mlabel{font-size:12px;color:var(--txt3);width:30px;flex-shrink:0;text-align:right;font-weight:600;}
.minput{flex:1;text-align:right;min-width:0;}
.mgrid.multi{grid-template-columns:1fr;gap:0;padding:2px 0 4px;}
.mrowm{padding:11px 16px;border-top:1px solid var(--line);}
.mgrid.multi .mrowm:first-child{border-top:none;}
.mrowm-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.mrowm-h b{font-size:13px;color:var(--txt2);font-weight:700;}
.msub{font-size:12px;color:var(--txt3);font-family:'IBM Plex Mono',monospace;}
.mrowm-b{display:flex;flex-wrap:wrap;gap:8px;}
.mrowm-b .field{flex:1;min-width:120px;}
/* ===================== 카드형 리디자인 ===================== */
.acchead{display:flex;align-items:center;gap:8px;margin-top:18px;flex-wrap:wrap;}
.hero{position:relative;overflow:hidden;
  background:linear-gradient(158deg,#172420 0%,var(--bg2) 62%);
  border:1px solid var(--line2);border-radius:18px;padding:20px 18px;margin-top:14px;}
.hero::after{content:"";position:absolute;right:-50px;top:-72px;width:200px;height:200px;
  background:radial-gradient(circle,rgba(74,222,128,.15),transparent 70%);pointer-events:none;}
.hero>*{position:relative;}
.hl{font-size:11px;color:var(--txt3);font-weight:600;letter-spacing:.07em;}
.hbig{font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:-.02em;
  font-size:clamp(26px,8.5vw,34px);margin-top:7px;line-height:1;}
.heropnl{display:inline-flex;align-items:center;gap:5px;margin-top:11px;
  font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;
  padding:5px 11px;border-radius:8px;}
.heropnl.pos{background:rgba(74,222,128,.14);color:var(--mint);}
.heropnl.neg{background:rgba(251,113,133,.14);color:var(--coral);}
.compbar{display:flex;gap:2px;height:11px;border-radius:6px;overflow:hidden;
  background:var(--bg3);margin-top:18px;}
.compbar i{height:100%;display:block;min-width:3px;}
.complegend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:12px;}
.cl{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--txt2);}
.cl .dot{width:8px;height:8px;border-radius:3px;flex-shrink:0;}
.cl b{font-family:'IBM Plex Mono',monospace;color:var(--txt);font-weight:600;margin-left:1px;}
.herodiv{height:1px;background:var(--line2);margin:16px 0 14px;}
.rbctrl{display:flex;align-items:flex-end;gap:12px;}
.wsumrow{display:flex;justify-content:space-between;align-items:center;margin-top:15px;
  font-size:12px;color:var(--txt3);font-weight:600;flex-wrap:wrap;gap:8px;}
.wsumrow .mono{font-size:13px;font-weight:600;}

.statline{display:flex;margin-top:10px;border:1px solid var(--line);
  border-radius:13px;overflow:hidden;background:var(--bg2);}
.stat{flex:1;min-width:0;padding:12px 3px;text-align:center;}
.stat+.stat{border-left:1px solid var(--line);}
.stat .sl{font-size:10px;color:var(--txt3);font-weight:600;white-space:nowrap;}
.stat .sv{font-family:'IBM Plex Mono',monospace;font-size:clamp(10px,3vw,13.5px);
  font-weight:600;letter-spacing:-.02em;margin-top:5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
@media(max-width:359px){
  .statline{flex-wrap:wrap;}
  .stat{flex-basis:50%;}
  .stat:nth-child(n+3){border-top:1px solid var(--line);}
  .stat:nth-child(3){border-left:none;}
}

.hcard,.rbcard{background:var(--bg2);border:1px solid var(--line);
  border-radius:14px;padding:15px;margin-top:10px;transition:border-color .15s;}
.hcard:hover,.rbcard:hover{border-color:var(--line2);}
.hcrow{display:flex;align-items:flex-start;gap:10px;}
.hcname{flex:1;min-width:0;}
.nameinput{background:none;border:none;border-bottom:1px solid transparent;
  color:var(--txt);font-size:15px;font-weight:700;font-family:inherit;
  outline:none;padding:1px 0;width:100%;letter-spacing:-.01em;}
.nameinput:focus{border-bottom-color:var(--mint);}
.codeinput{background:none;border:none;color:var(--txt3);
  font-family:'IBM Plex Mono',monospace;font-size:11px;outline:none;
  padding:3px 0 0;width:100%;}
.codeinput:focus{color:var(--mint);}
.hcval{display:flex;align-items:baseline;justify-content:space-between;
  gap:10px;margin-top:13px;}
.hcval .v{font-family:'IBM Plex Mono',monospace;font-size:21px;font-weight:600;}
.hcval .r{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;}
.wbar{height:7px;border-radius:4px;background:var(--bg3);overflow:hidden;margin-top:10px;}
.wbar i{display:block;height:100%;border-radius:4px;transition:width .35s ease;}
.wmeta{display:flex;justify-content:space-between;gap:8px;margin-top:7px;
  font-size:11px;color:var(--txt3);}
.wmeta b{font-family:'IBM Plex Mono',monospace;color:var(--txt2);font-weight:600;}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
.field{min-width:0;}
.fl{font-size:10px;color:var(--txt3);font-weight:600;margin-bottom:5px;letter-spacing:.02em;}
.cardinput{width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--line);
  border-radius:8px;padding:8px 9px;font-size:13px;
  font-family:'IBM Plex Mono',monospace;color:var(--txt);outline:none;
  text-align:right;transition:.15s;}
.cardinput:focus{border-color:var(--mint);background:#1f2521;}
.cardstatic{width:100%;box-sizing:border-box;background:transparent;
  border:1px solid var(--line);border-radius:8px;padding:8px 9px;font-size:13px;
  font-family:'IBM Plex Mono',monospace;color:var(--txt2);text-align:right;}
.cardstatic .sub{font-size:10px;color:var(--txt3);}
.cashcard{display:flex;align-items:center;gap:12px;background:var(--bg2);
  border:1px dashed var(--line2);border-radius:14px;padding:14px 15px;margin-top:10px;}

.rbtop{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
.rbname{font-size:15px;font-weight:700;letter-spacing:-.01em;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rbcode{font-family:'IBM Plex Mono',monospace;font-size:11px;
  color:var(--txt3);flex-shrink:0;}
.wt{display:flex;align-items:center;gap:8px;margin-top:13px;}
.wt .wl{font-size:11px;color:var(--txt3);font-weight:600;}
.wtinput{width:60px;background:var(--bg3);border:1px solid var(--line);
  border-radius:7px;padding:6px 8px;font-family:'IBM Plex Mono',monospace;
  font-size:14px;text-align:right;color:var(--txt);outline:none;transition:.15s;}
.wtinput:focus{border-color:var(--mint);background:#1f2521;}
.rbtarget{font-size:13px;color:var(--mint);font-weight:600;}
.rbflow{display:flex;align-items:center;justify-content:space-between;
  gap:10px;margin-top:13px;padding-top:12px;border-top:1px solid var(--line);}
.rbqty{font-size:12px;color:var(--txt2);}
.rbqty b{font-family:'IBM Plex Mono',monospace;color:var(--txt);
  font-weight:600;font-size:14px;}
.arrow{color:var(--txt3);margin:0 5px;}
.rbtrade{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.rbresult{display:flex;align-items:center;justify-content:space-between;
  gap:12px;background:var(--bg2);border:1px solid var(--line2);
  border-radius:14px;padding:15px;margin-top:14px;}

/* ===== 인앱 모달 · 토스트 ===== */
.modal{position:fixed;inset:0;z-index:100;display:none;
  align-items:center;justify-content:center;padding:22px;
  background:rgba(0,0,0,.62);backdrop-filter:blur(2px);}
.modal.show{display:flex;animation:mfade .16s ease;}
@keyframes mfade{from{opacity:0;}to{opacity:1;}}
.mbox{width:100%;max-width:380px;background:var(--bg2);
  border:1px solid var(--line2);border-radius:18px;padding:20px;
  animation:mrise .18s ease;}
@keyframes mrise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
.mtitle{font-size:16px;font-weight:700;color:var(--txt);letter-spacing:-.01em;}
.mbody{margin-top:12px;}
.mtext{font-size:13.5px;color:var(--txt2);line-height:1.65;margin:0;}
.minput-f{width:100%;background:var(--bg3);border:1px solid var(--line2);
  border-radius:10px;color:var(--txt);font-size:15px;padding:11px 12px;
  outline:none;font-family:inherit;box-sizing:border-box;}
.minput-f:focus{border-color:var(--mint);}
.mbtns{display:flex;gap:8px;margin-top:18px;}
.mbtns button{flex:1;}
.btn.danger{background:var(--coral);color:#1a0d10;}
.msumwrap{max-height:46vh;overflow-y:auto;}
.msum{display:flex;justify-content:space-between;align-items:center;
  font-size:13.5px;color:var(--txt2);padding:7px 2px;}
.msum b{color:var(--txt);font-family:'IBM Plex Mono',monospace;}

/* ===== 증권계좌별 매입(lot) 입력 ===== */
.lotwrap{margin-top:14px;}
.lotblk{margin-top:11px;}
.lotblk:first-child{margin-top:0;}
.lotname{font-size:11px;font-weight:700;color:var(--mint);
  margin-bottom:6px;letter-spacing:.01em;}
.lotpair{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.lotsum{display:flex;justify-content:space-between;align-items:center;
  gap:8px 14px;margin-top:12px;padding-top:11px;
  border-top:1px solid var(--line);
  font-size:12px;color:var(--txt3);font-weight:600;flex-wrap:wrap;}
.lotsum b{color:var(--txt);font-family:'IBM Plex Mono',monospace;font-size:13px;}
.brokerrow{display:flex;align-items:center;gap:8px;margin-top:7px;}
.brokername{flex:1;min-width:0;text-align:left;background:var(--bg3);
  border:1px solid var(--line);border-radius:8px;
  padding:9px 11px;font-size:13px;font-weight:600;color:var(--txt);
  font-family:inherit;cursor:pointer;transition:.15s;}
.brokername:hover{border-color:var(--line2);}
.brokername .ed{color:var(--txt3);font-size:11px;margin-left:4px;}
.toast{position:fixed;left:50%;bottom:30px;transform:translate(-50%,16px);
  z-index:110;background:#23292500;color:var(--txt);font-size:13.5px;
  font-weight:600;padding:0;border-radius:11px;opacity:0;pointer-events:none;
  transition:opacity .22s ease,transform .22s ease;max-width:84vw;}
.toast.show{background:#252b27;border:1px solid var(--line2);
  padding:12px 18px;opacity:1;transform:translate(-50%,0);
  box-shadow:0 8px 28px rgba(0,0,0,.45);}
</style>
</head>
<body>
<div class="wrap"><header>
  <div class="row" style="align-items:baseline">
    <span class="brand">리밸런<b>서</b></span>
    <span class="tagline">적립식 리밸런싱 포트폴리오 관리</span>
  </div>
  <div class="pills" id="pills"></div>
</header></div>
<div class="wrap"><main id="app"></main></div>
<input type="file" id="importer" accept="application/json" style="display:none">
<div class="modal" id="modal"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ===================== 유틸 ===================== */
var C={mint:"#4ade80",coral:"#fb7185",gold:"#f5b942",blue:"#609cf6",
  txt:"#e9efea",txt2:"#8b968f",txt3:"#5e6a63",line:"#262b27",bg3:"#1b201d"};
var SLICE=["#4ade80","#609cf6","#f5b942","#fb7185","#a78bfa","#22d3ee"];
function uid(){return Math.random().toString(36).slice(2,9);}
function won(n){return Math.round(n||0).toLocaleString("ko-KR");}
function pct(n){return (n>=0?"+":"")+(n*100).toFixed(2)+"%";}
function pct0(n){return (n*100).toFixed(1)+"%";}
function todayStr(){return new Date().toISOString().slice(0,10);}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});}
function num(v){var d=String(v).replace(/[^0-9.]/g,"");var n=parseFloat(d);return isNaN(n)?0:n;}
function monthsBetween(from){var a=new Date(from),b=new Date();
  var m=(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth());
  if(b.getDate()<a.getDate())m-=1;return Math.max(m,0);}
function daysBetween(from){return Math.max((new Date()-new Date(from))/86400000,1);}
function el(id){return document.getElementById(id);}

/* ===================== 인앱 모달 · 토스트 ===================== */
function toast(msg){
  var t=el("toast");if(!t)return;
  t.textContent=msg;t.className="toast show";
  clearTimeout(toast._t);toast._t=setTimeout(function(){t.className="toast";},2400);
}
/* opts: {title, body(HTML), okText, cancelText(null이면 숨김), danger, onOk(val)} */
function modal(opts){
  var ov=el("modal");
  ov.innerHTML='<div class="mbox">'
    +'<div class="mtitle">'+esc(opts.title||"")+'</div>'
    +'<div class="mbody">'+(opts.body||"")+'</div>'
    +'<div class="mbtns">'
    +(opts.cancelText===null?"":'<button class="ghost" data-m="cancel">'+esc(opts.cancelText||"취소")+'</button>')
    +'<button class="btn'+(opts.danger?" danger":"")+'" data-m="ok">'+esc(opts.okText||"확인")+'</button>'
    +'</div></div>';
  ov.className="modal show";
  modal._onOk=opts.onOk||function(){};
  var inp=ov.querySelector("[data-minput]");
  if(inp)setTimeout(function(){try{inp.focus();inp.select();}catch(e){}},60);
}
function closeModal(){var ov=el("modal");ov.className="modal";ov.innerHTML="";}
function confirmModal(title,text,onOk,danger,okText){
  modal({title:title,body:'<p class="mtext">'+esc(text)+'</p>',
    okText:okText||"확인",danger:danger,onOk:function(){onOk();}});
}
function promptModal(title,placeholder,defVal,onOk,numeric){
  modal({title:title,
    body:'<input class="minput-f" data-minput type="text"'+(numeric?' inputmode="decimal"':'')
      +' value="'+esc(defVal||"")+'" placeholder="'+esc(placeholder||"")+'">',
    okText:"확인",
    onOk:function(val){if(val!=null&&String(val).trim())onOk(String(val).trim());}});
}
el("modal").addEventListener("click",function(e){
  var b=e.target.closest("[data-m]");
  if(!b){if(e.target.id==="modal")closeModal();return;}
  var act=b.getAttribute("data-m");
  if(act==="cancel"){closeModal();return;}
  if(act==="ok"){
    var inp=el("modal").querySelector("[data-minput]");
    var val=inp?inp.value:null;
    var fields={},fl=el("modal").querySelectorAll("[data-mfield]");
    for(var fi=0;fi<fl.length;fi++)fields[fl[fi].getAttribute("data-mfield")]=fl[fi].value;
    var cb=modal._onOk;
    closeModal();
    if(cb)cb(val,fields);
  }
});
el("modal").addEventListener("keydown",function(e){
  if(e.key==="Enter"){var ok=el("modal").querySelector('[data-m="ok"]');
    if(ok){e.preventDefault();ok.click();}}
  else if(e.key==="Escape")closeModal();
});

/* ===================== 증권계좌(broker) · 매입 lot 헬퍼 ===================== */
/* 한 종목(holding)은 증권계좌별 lot 배열을 가진다: lots=[{b:brokerId,qty,cost},...]
   종목의 보유수량·총매입금액은 전 lot의 합계, 계좌 예수금은 전 broker.cash 의 합계다. */
function hQty(h){var s=0,L=h.lots||[],i;for(i=0;i<L.length;i++)s+=(L[i].qty||0);return s;}
function hCost(h){var s=0,L=h.lots||[],i;for(i=0;i<L.length;i++)s+=(L[i].cost||0);return s;}
function accCash(acc){var s=0,B=acc.brokers||[],i;for(i=0;i<B.length;i++)s+=(B[i].cash||0);return s;}
function lotFor(h,bid){
  h.lots=h.lots||[];
  for(var i=0;i<h.lots.length;i++)if(h.lots[i].b===bid)return h.lots[i];
  var nl={b:bid,qty:0,cost:0};h.lots.push(nl);return nl;
}
/* 정수 delta(+매수/−매도)를 각 lot 보유수량 비율대로 분배 (음수 수량 방지) */
function distributeDelta(weights,delta){
  var n=weights.length,out=[],i,tot=0;
  for(i=0;i<n;i++){out.push(0);tot+=weights[i];}
  if(delta===0||n===0)return out;
  if(delta>0){
    if(tot<=0){out[0]=delta;return out;}
    var rem=delta;
    for(i=0;i<n;i++){var v=(i===n-1)?rem:Math.round(delta*weights[i]/tot);out[i]=v;rem-=v;}
  }else{
    var sell=-delta,rem2=sell;
    for(i=0;i<n;i++){
      var want=(i===n-1)?rem2:Math.round(sell*weights[i]/tot);
      if(want>weights[i])want=weights[i];
      if(want>rem2)want=rem2;
      out[i]=-want;rem2-=want;
    }
    for(i=0;i<n&&rem2>0;i++){
      var avail=weights[i]+out[i],more=avail<rem2?avail:rem2;
      out[i]-=more;rem2-=more;
    }
  }
  return out;
}

/* ===================== 계산 ===================== */
function calcAccount(acc,prices){
  var rows=acc.holdings.map(function(h){
    var price=prices[h.code]||0,cost=hCost(h),value=price*hQty(h);
    return {h:h,price:price,cost:cost,value:value,ret:cost>0?value/cost-1:0};});
  var stockValue=rows.reduce(function(s,r){return s+r.value;},0);
  var stockCost=rows.reduce(function(s,r){return s+r.cost;},0);
  rows.forEach(function(r){r.share=stockValue>0?r.value/stockValue:0;});
  var totalAsset=stockValue+accCash(acc);
  var sorted=acc.contributions.slice().sort(function(a,b){return a.date<b.date?-1:1;});
  var contributed=sorted.reduce(function(s,c){return s+c.amount;},0);
  var pnl=totalAsset-contributed;
  var totalRet=contributed>0?pnl/contributed:0;
  var first=sorted[0]?sorted[0].date:null;
  var months=first?monthsBetween(first):0;
  var days=first?daysBetween(first):1;
  var cagr=(first&&contributed>0&&totalAsset>0&&days>=30)?xirr(sorted,totalAsset):null;
  return {rows:rows,stockValue:stockValue,stockCost:stockCost,totalAsset:totalAsset,
    contributed:contributed,pnl:pnl,totalRet:totalRet,months:months,cagr:cagr,first:first,sorted:sorted};
}
/* 납입 내역 중 가장 최근 월(YYYY-MM). 배열 정렬과 무관하게 계산. */
function latestYM(acc){
  return (acc.contributions||[]).reduce(function(m,c){
    var k=c.date.slice(0,7);return k>m?k:m;},"");
}
/* 납입 내역에서 아직 리밸런싱으로 반영되지 않은 납입금(= 이번에 배분할 금액).
   deployedYM(마지막으로 반영 완료한 월) 이후 월의 납입액만 집계한다. */
function pendingContrib(acc){
  var dep=acc.deployedYM||"";
  var items=(acc.contributions||[]).filter(function(c){return c.date.slice(0,7)>dep;});
  var amount=items.reduce(function(s,c){return s+c.amount;},0);
  var byBroker={};
  items.forEach(function(c){byBroker[c.b]=(byBroker[c.b]||0)+c.amount;});
  var label="";
  if(items.length===1)label=items[0].date.slice(0,7);
  else if(items.length>1)label=items[0].date.slice(0,7)+" 외 "+(items.length-1)+"건";
  return {amount:amount,count:items.length,label:label,byBroker:byBroker};
}
/* 리밸런싱: 예수금 + 이번 추가 납입액까지 반영한 목표 평가자산(base)을 기준으로
   각 종목의 목표수량을 구하고, 현재 보유수량과의 차이만큼 매수/매도 수량을 산출한다.
   1차: 내림으로 초과 매수 방지 → 2차: 남은 현금으로 가장 부족한 종목부터 1주씩 추가. */
function calcRebalance(acc,prices,stat,addMoney){
  var base=stat.stockValue+accCash(acc)+(addMoney||0);
  var wsum=acc.holdings.reduce(function(s,h){return s+(h.weight||0);},0);
  var rows=acc.holdings.map(function(h){
    var price=prices[h.code]||0;
    var targetAmt=base*((h.weight||0)/100);
    var targetQty=price>0?Math.floor(targetAmt/price):0;  // 1차: 내림(추가 투입 방지)
    return {h:h,price:price,targetAmt:targetAmt,targetQty:targetQty};});
  // 2차: 남은 현금으로 목표금액 대비 가장 부족한 종목부터 1주씩 추가 매수(잔여 ≥0 유지)
  var leftover=base-rows.reduce(function(s,r){return s+r.targetQty*r.price;},0);
  for(var guard=0;guard<100000;guard++){
    var pick=null,best=-Infinity;
    rows.forEach(function(r){
      if(r.price>0&&r.price<=leftover){
        var shortfall=r.targetAmt-r.targetQty*r.price;   // 목표금액 대비 부족분
        if(shortfall>best){best=shortfall;pick=r;}
      }
    });
    if(!pick)break;
    pick.targetQty++;leftover-=pick.price;
  }
  rows.forEach(function(r){
    r.adjQty=r.targetQty-hQty(r.h);                 // +면 매수, -면 매도
    r.tradeAmt=r.adjQty*r.price;
  });
  var invested=rows.reduce(function(s,r){return s+r.targetQty*r.price;},0);
  return {base:base,wsum:wsum,rows:rows,invested:invested,leftover:base-invested};
}

/* ===================== 연환산 수익률: XIRR (내부수익률) ===================== */
/* 각 납입 시점을 반영한 정확한 연 환산 수익률.
   납입금=음(-)의 현금유출, 현재 평가자산=양(+)의 유입으로 보고
   순현재가치(NPV)=0 이 되는 연이율 r 을 이분법으로 구한다. */
function xirr(conts,totalAsset){
  if(!conts.length||totalAsset<=0)return 0;
  var d0=new Date(conts[0].date).getTime();
  var flows=[];
  for(var i=0;i<conts.length;i++){
    flows.push([(new Date(conts[i].date).getTime()-d0)/86400000,-conts[i].amount]);
  }
  flows.push([(Date.now()-d0)/86400000,totalAsset]);
  function npv(r){
    var s=0;
    for(var j=0;j<flows.length;j++)s+=flows[j][1]/Math.pow(1+r,flows[j][0]/365);
    return s;
  }
  var lo=-0.9999,hi=20;
  if(npv(hi)>=0)return hi;
  if(npv(lo)<=0)return lo;
  for(var k=0;k<200;k++){
    var mid=(lo+hi)/2;
    if(npv(mid)>0)lo=mid;else hi=mid;
  }
  return (lo+hi)/2;
}

/* ===================== 납입내역 월 단위 통합 ===================== */
function consolidate(st){
  if(!st||typeof st!=="object")st={};
  if(!Array.isArray(st.accounts))st.accounts=[];
  if(!st.prices||typeof st.prices!=="object")st.prices={};
  st.accounts.forEach(function(a){
    if(!a.id)a.id=uid();
    if(typeof a.name!=="string")a.name="계좌";
    if(!Array.isArray(a.holdings))a.holdings=[];
    if(!Array.isArray(a.contributions))a.contributions=[];
    /* 증권계좌(broker) 보장 — 최소 1개, 각 broker는 예수금(cash)을 가진다 */
    if(!Array.isArray(a.brokers)||!a.brokers.length){
      a.brokers=[{id:uid(),name:"증권계좌",cash:0}];
    }
    a.brokers.forEach(function(b,bi){
      if(!b.id)b.id=uid();
      if(typeof b.name!=="string"||!b.name)b.name="증권계좌 "+(bi+1);
      if(typeof b.cash!=="number"||isNaN(b.cash))b.cash=0;
    });
    /* 옛 데이터의 계좌 단위 예수금(a.cash) → 첫 증권계좌로 이전 */
    if(typeof a.cash==="number"&&!isNaN(a.cash)){
      a.brokers[0].cash=(a.brokers[0].cash||0)+a.cash;
    }
    delete a.cash;
    var brokerIds={};a.brokers.forEach(function(b){brokerIds[b.id]=1;});
    var firstBid=a.brokers[0].id;
    a.holdings.forEach(function(h){
      if(!h.id)h.id=uid();
      if(typeof h.code!=="string")h.code=String(h.code||"");
      if(typeof h.name!=="string")h.name=String(h.name||"");
      if(typeof h.weight!=="number"||isNaN(h.weight))h.weight=0;
      /* 옛 데이터(qty·cost·avg 단일값) → lots 배열로 변환 */
      if(!Array.isArray(h.lots)){
        var oq=(typeof h.qty==="number"&&!isNaN(h.qty))?h.qty:0;
        var oc=(typeof h.cost==="number"&&!isNaN(h.cost))?h.cost
              :Math.round((typeof h.avg==="number"?h.avg:0)*oq);
        h.lots=[{b:firstBid,qty:oq,cost:oc}];
      }
      /* 사라진 증권계좌의 lot 제거, 수치 보정 */
      h.lots=h.lots.filter(function(l){return l&&brokerIds[l.b];});
      h.lots.forEach(function(l){
        if(typeof l.qty!=="number"||isNaN(l.qty))l.qty=0;
        if(typeof l.cost!=="number"||isNaN(l.cost))l.cost=0;
      });
      /* 모든 증권계좌에 lot 보장 + 계좌 순서대로 정렬 */
      var byB={};h.lots.forEach(function(l){byB[l.b]=l;});
      h.lots=a.brokers.map(function(b){return byB[b.id]||{b:b.id,qty:0,cost:0};});
      delete h.qty;delete h.cost;delete h.avg;
    });
    /* 입금 내역: 월 + 증권계좌 단위로 합산. 옛 데이터(b 없음)는 첫 계좌로 귀속 */
    var map={};
    a.contributions.forEach(function(c){
      if(!c||!c.date)return;
      var bid=(c.b&&brokerIds[c.b])?c.b:firstBid;
      var k=String(c.date).slice(0,7)+"|"+bid;
      if(!map[k])map[k]={id:uid(),date:c.date,amount:0,b:bid};
      map[k].amount+=(typeof c.amount==="number"&&!isNaN(c.amount)?c.amount:0);
      if(c.date<map[k].date)map[k].date=c.date;
    });
    a.contributions=Object.keys(map).map(function(k){return map[k];})
      .filter(function(c){return c.amount>0;})
      .sort(function(x,y){return x.date<y.date?-1:1;});
    if(a.deployedYM===undefined){
      var lc=a.contributions[a.contributions.length-1];
      a.deployedYM=lc?lc.date.slice(0,7):"";
    }
  });
  return st;
}

/* ===================== 실시간 시세: Yahoo Finance ===================== */
/* Yahoo Finance 를 프록시 경유로 호출(브라우저 CORS 우회).
   기본은 공개 프록시, 시세 설정에서 Cloudflare Worker 주소를 넣으면 우선 사용. */
var PUBLIC_PROXIES=["https://api.allorigins.win/raw?url=","https://api.codetabs.com/v1/proxy/?quest="];
var WORKER_CODE='export default {\n'
  +'  async fetch(req) {\n'
  +'    const cors = { "Access-Control-Allow-Origin": "*", "Access-Control-Allow-Methods": "GET,OPTIONS" };\n'
  +'    if (req.method === "OPTIONS") return new Response(null, { headers: cors });\n'
  +'    const t = new URL(req.url).searchParams.get("url");\n'
  +'    if (!t) return new Response("missing url", { status: 400, headers: cors });\n'
  +'    const r = await fetch(t, { headers: { "User-Agent": "Mozilla/5.0" } });\n'
  +'    return new Response(r.body, { status: r.status, headers: { ...cors, "Content-Type": "application/json" } });\n'
  +'  }\n'
  +'};';
function proxyBases(){
  if(state&&state.proxyUrl){
    var u=state.proxyUrl.trim();
    if(u){
      if(!/[?&](url|quest)=$/.test(u)) u+=(u.indexOf("?")>=0?"&":"?")+"url=";
      return [u].concat(PUBLIC_PROXIES);
    }
  }
  return PUBLIC_PROXIES;
}
function proxyFetchJson(targetUrl){
  var bases=proxyBases(),i=0;
  function step(){
    if(i>=bases.length) return Promise.reject(new Error("proxy failed"));
    var base=bases[i++];
    return fetch(base+encodeURIComponent(targetUrl)).then(function(r){
      if(!r.ok) throw new Error("HTTP "+r.status);
      return r.text();
    }).then(function(txt){return JSON.parse(txt);}).catch(function(){return step();});
  }
  return step();
}
/* 종목코드 -> Yahoo 심볼 후보. 순수 숫자(한국 종목)면 .KS / .KQ 자동 부착 */
function yahooSymbols(code){
  code=(code||"").trim();
  if(/^\d{4,6}$/.test(code)) return [code+".KS",code+".KQ"];
  return [code];
}
function fetchYahooPrice(symbol){
  var url="https://query1.finance.yahoo.com/v8/finance/chart/"+encodeURIComponent(symbol)
    +"?interval=1d&range=1d&t="+Date.now();
  return proxyFetchJson(url).then(function(d){
    var r=d&&d.chart&&d.chart.result&&d.chart.result[0];
    if(!r||!r.meta||r.meta.regularMarketPrice==null) throw new Error("no price");
    return r.meta.regularMarketPrice;
  });
}
function fetchCodePrice(code){
  var cands=yahooSymbols(code),i=0;
  function step(){
    if(i>=cands.length) return Promise.reject(new Error("not found"));
    return fetchYahooPrice(cands[i++]).catch(function(){return step();});
  }
  return step();
}
/* 모든 계좌의 고유 종목코드 시세를 한 번에 갱신 */
function refreshPrices(silent){
  if(ui.fetching) return;
  if(!state||!Array.isArray(state.accounts)) return;
  var codes={};
  state.accounts.forEach(function(a){
    a.holdings.forEach(function(h){if(h.code&&String(h.code).trim())codes[h.code]=1;});
  });
  var list=Object.keys(codes);
  if(!list.length){ if(!silent)toast("보유 종목이 없습니다."); return; }
  ui.fetching=true; render();
  var ok=0;
  Promise.all(list.map(function(code){
    return fetchCodePrice(code).then(function(p){
      if(p>0){state.prices[code]=p;ok++;}
    }).catch(function(){});
  })).then(function(){
    ui.fetching=false;
    if(ok>0){state.lastFetch=Date.now();save();}
    render();
    if(!silent){
      if(ok===0) toast("시세를 가져오지 못했습니다. 시세 설정의 프록시를 확인해 주세요.");
      else if(ok<list.length) toast("일부 시세만 갱신됨 ("+ok+"/"+list.length+") — 종목코드 확인");
    }
  });
}
function fmtTime(ts){
  if(!ts) return "없음";
  var d=new Date(ts),p=function(n){return n<10?"0"+n:""+n;};
  return (d.getMonth()+1)+"/"+d.getDate()+" "+p(d.getHours())+":"+p(d.getMinutes());
}

var STORE="rebalancer:v3";
var state=null;
var ui={accId:null,tab:"port",openYears:{},fetching:false,showProxy:false,showBrokers:false};
var saveTimer=null;
function load(){try{var r=localStorage.getItem(STORE);if(r)return JSON.parse(r);}catch(e){}return null;}
function save(){clearTimeout(saveTimer);saveTimer=setTimeout(function(){
  try{localStorage.setItem(STORE,JSON.stringify(state));}catch(e){}},400);}
function activeAcc(){return state.accounts.filter(function(a){return a.id===ui.accId;})[0];}

/* ===================== 렌더: 빌더 ===================== */
function metricHTML(label,value,tone,sub){
  var col=tone==="pos"?C.mint:tone==="neg"?C.coral:tone==="gold"?C.gold:C.txt;
  return '<div class="metric"><div class="ml">'+esc(label)+'</div>'
    +'<div class="mv" style="color:'+col+'">'+esc(value)+'</div>'
    +(sub?'<div class="ms">'+esc(sub)+'</div>':'')+'</div>';
}
function bar(label,right){
  return '<div class="sectionbar"><h3><span class="tick"></span>'+esc(label)+'</h3>'
    +'<div>'+(right||"")+'</div></div>';
}

function buildPills(){
  var h="";
  state.accounts.forEach(function(a){
    h+='<button class="pill'+(ui.accId===a.id?" on":"")
      +'" data-act="view" data-id="'+a.id+'">'+esc(a.name)+'</button>';});
  h+='<button class="pill add" data-act="add-acc">+ 계좌</button>';
  el("pills").innerHTML=h;
}

/* ---- 카드형 빌더 (공용) ---- */
function compColor(i){return SLICE[i%SLICE.length];}
function compBarHTML(stat,cash){
  var total=stat.totalAsset||1,segs="";
  stat.rows.forEach(function(r,i){
    if(r.value<=0)return;
    segs+='<i style="width:'+(r.value/total*100)+'%;background:'+compColor(i)+'"></i>';});
  if(cash>0)segs+='<i style="width:'+(cash/total*100)+'%;background:#3a443d"></i>';
  return segs||'<i style="width:100%;background:var(--bg3)"></i>';
}
function compLegendHTML(stat,cash){
  var total=stat.totalAsset||1,h="";
  stat.rows.forEach(function(r,i){
    if(r.value<=0)return;
    h+='<span class="cl"><span class="dot" style="background:'+compColor(i)+'"></span>'
      +esc(r.h.name||r.h.code||"종목")+' <b>'+pct0(r.value/total)+'</b></span>';});
  if(cash>0)h+='<span class="cl"><span class="dot" style="background:#3a443d"></span>'
    +'현금 <b>'+pct0(cash/total)+'</b></span>';
  return h||'<span class="note">보유 종목이 없습니다</span>';
}
function portStatStrip(stat){
  function cell(l,v,tone){
    var col=tone==="pos"?C.mint:tone==="neg"?C.coral:tone==="gold"?C.gold:C.txt;
    return '<div class="stat"><div class="sl">'+esc(l)+'</div>'
      +'<div class="sv" style="color:'+col+'">'+esc(v)+'</div></div>';}
  return cell("총 수익률",pct(stat.totalRet),stat.totalRet>=0?"pos":"neg")
    +cell("연 환산",stat.cagr==null?"산정 전":pct0(stat.cagr),"gold")
    +cell("총 납입금","₩"+won(stat.contributed))
    +cell("투자 기간",stat.months+"개월");
}
function portHeroHTML(stat,cash){
  var pos=stat.pnl>=0;
  return '<div class="hero">'
    +'<div class="hl">총 평가자산</div>'
    +'<div class="hbig" id="h_big">₩'+won(stat.totalAsset)+'</div>'
    +'<div class="heropnl '+(pos?"pos":"neg")+'" id="h_pnl">'
      +(pos?"▲":"▼")+' ₩'+won(Math.abs(stat.pnl))+' · '+pct(stat.totalRet)+'</div>'
    +'<div class="compbar" id="h_comp">'+compBarHTML(stat,cash)+'</div>'
    +'<div class="complegend" id="h_leg">'+compLegendHTML(stat,cash)+'</div>'
    +'</div>';
}
function holdingCardHTML(r,i,acc){
  var h=r.h;
  var brokers=acc.brokers||[];
  var multi=brokers.length>1;
  var totQty=hQty(h),totCost=hCost(h);
  var pnl=r.value-r.cost;
  var avg=totQty>0?r.cost/totQty:0;
  var priceTxt=r.price>0?"₩"+won(r.price):'<span class="sub">시세 없음</span>';
  var head='<div class="hcrow"><div class="hcname">'
      +'<input class="nameinput" data-edit="h-name" data-id="'+h.id+'" value="'+esc(h.name)+'" placeholder="상품명">'
      +'<input class="codeinput" data-edit="h-code" data-id="'+h.id+'" value="'+esc(h.code)+'" placeholder="종목코드">'
    +'</div><button class="x" data-act="del-h" data-id="'+h.id+'">✕</button></div>'
    +'<div class="hcval"><span class="v" id="pv_'+h.id+'">₩'+won(r.value)+'</span>'
      +'<span class="r" id="pr_'+h.id+'" style="color:'+(r.ret>=0?C.mint:C.coral)+'">'+pct(r.ret)+'</span></div>'
    +'<div class="wbar"><i id="pwf_'+h.id+'" style="width:'+(r.share*100)+'%;background:'+compColor(i)+'"></i></div>'
    +'<div class="wmeta"><span>비중 <b id="pwp_'+h.id+'">'+pct0(r.share)+'</b></span>'
      +'<span>평가손익 <b id="pl_'+h.id+'" style="color:'+(pnl>=0?C.mint:C.coral)+'">'
      +(pnl>=0?"+":"−")+'₩'+won(Math.abs(pnl))+'</b></span></div>';
  var autoFields='<div class="fields"'+(multi?' style="margin-top:10px"':'')+'>'
    +'<div class="field"><div class="fl">매입단가 (자동)</div>'
      +'<div class="cardstatic" id="pa_'+h.id+'">₩'+won(Math.round(avg))+'</div></div>'
    +'<div class="field"><div class="fl">현재가 (시세)</div>'
      +'<div class="cardstatic" id="pp_'+h.id+'">'+priceTxt+'</div></div></div>';
  var body;
  if(!multi){
    var l0=h.lots[0]||{b:(brokers[0]||{}).id,qty:0,cost:0};
    body='<div class="fields">'
      +'<div class="field"><div class="fl">총 매입금액</div>'
        +'<input class="cardinput" data-edit="lot-cost" data-id="'+h.id+'" data-b="'+l0.b+'" inputmode="decimal" value="'+won(l0.cost||0)+'"></div>'
      +'<div class="field"><div class="fl">보유수량</div>'
        +'<input class="cardinput" data-edit="lot-qty" data-id="'+h.id+'" data-b="'+l0.b+'" inputmode="decimal" value="'+won(l0.qty||0)+'"></div>'
      +'</div>'+autoFields;
  }else{
    var blks=h.lots.map(function(l){
      var bk=brokers.filter(function(b){return b.id===l.b;})[0];
      return '<div class="lotblk"><div class="lotname">'+esc(bk?bk.name:"증권계좌")+'</div>'
        +'<div class="lotpair">'
        +'<div class="field"><div class="fl">매입수량</div>'
          +'<input class="cardinput" data-edit="lot-qty" data-id="'+h.id+'" data-b="'+l.b+'" inputmode="decimal" value="'+won(l.qty||0)+'"></div>'
        +'<div class="field"><div class="fl">매입금액</div>'
          +'<input class="cardinput" data-edit="lot-cost" data-id="'+h.id+'" data-b="'+l.b+'" inputmode="decimal" value="'+won(l.cost||0)+'"></div>'
        +'</div></div>';
    }).join("");
    body='<div class="lotwrap">'+blks
      +'<div class="lotsum"><span>합계</span>'
        +'<span>수량 <b id="ltq_'+h.id+'">'+won(totQty)+'</b></span>'
        +'<span>매입금액 <b id="ltc_'+h.id+'">₩'+won(totCost)+'</b></span></div>'
      +'</div>'+autoFields;
  }
  return '<div class="hcard">'+head+body+'</div>';
}
function cashCardHTML(acc){
  var bs=acc.brokers||[];

    var b0=bs[0]||{id:"",cash:0};

      +'>'+(ui.fetching?"갱신 중…":"↻ 시세")+'</button> <button class="ghost" data-act="add-h">+ 종목</button>')

function brokerLine(acc){

function brokerPanel(acc){

      +'<button class="brokername" data-act="rename-broker" data-b="'+b.id+'">'+esc(b.name)+' <span class="ed">✎</span></button>'
      +'<button class="ghost sm" data-act="del-broker" data-b="'+b.id+'"'+(bs.length<=1?" disabled":"")+'>삭제</button>'

    +'종목 카드마다 증권계좌별 매입수량·매입금액을 따로 입력하면 합계가 자동으로 계산됩니다.</p>'
    +rows
    +'<button class="ghost" data-act="add-broker" style="margin-top:9px">+ 증권계좌 추가</button>'
    +'</div>';
}
function softPort(acc){
  var stat=calcAccount(acc,state.prices);
  setT("h_big","₩"+won(stat.totalAsset));
  setT("cash_total","₩"+won(accCash(acc)));
  var hp=el("h_pnl");
  if(hp){
    var pos=stat.pnl>=0;
    hp.className="heropnl "+(pos?"pos":"neg");
    hp.textContent=(pos?"▲":"▼")+" ₩"+won(Math.abs(stat.pnl))+" · "+pct(stat.totalRet);
  }
  if(el("h_comp"))el("h_comp").innerHTML=compBarHTML(stat,accCash(acc));
  if(el("h_leg"))el("h_leg").innerHTML=compLegendHTML(stat,accCash(acc));
  if(el("m_port"))el("m_port").innerHTML=portStatStrip(stat);
  stat.rows.forEach(function(r,i){
    setT("pv_"+r.h.id,"₩"+won(r.value));
    setT("pr_"+r.h.id,pct(r.ret),r.ret>=0?C.mint:C.coral);
    var pnl=r.value-r.cost;
    setT("pl_"+r.h.id,(pnl>=0?"+":"−")+"₩"+won(Math.abs(pnl)),pnl>=0?C.mint:C.coral);
    var tq=hQty(r.h);
    var avg=tq>0?r.cost/tq:0;
    setT("pa_"+r.h.id,"₩"+won(Math.round(avg)));
    setT("ltq_"+r.h.id,won(tq));
    setT("ltc_"+r.h.id,"₩"+won(hCost(r.h)));
    var pp=el("pp_"+r.h.id);
    if(pp)pp.innerHTML=r.price>0?"₩"+won(r.price):'<span class="sub">시세 없음</span>';
    setT("pwp_"+r.h.id,pct0(r.share));
    var f=el("pwf_"+r.h.id);
    if(f){f.style.width=(r.share*100)+"%";f.style.background=compColor(i);}
  });
}

/* ---- 입금 내역 탭 ---- */
function contribMetricsHTML(stat){
  var w=stat.sorted.filter(function(c){return c.amount>0;});
  var total=stat.contributed;
  return metricHTML("총 납입금","₩"+won(total))
    +metricHTML("납입 개월수",w.length+"개월")
    +metricHTML("월 평균 납입","₩"+won(w.length?total/w.length:0))
    +metricHTML("첫 납입",w[0]?w[0].date.slice(0,7):"—");
}
function viewContrib(acc){
  var stat=calcAccount(acc,state.prices);
  var brokers=acc.brokers||[];
  var multi=brokers.length>1;
  var ymMap={},ymbMap={};
  stat.sorted.forEach(function(c){
    var k=c.date.slice(0,7);
    ymMap[k]=(ymMap[k]||0)+c.amount;
    ymbMap[k+"|"+c.b]=(ymbMap[k+"|"+c.b]||0)+c.amount;
  });
  var w=stat.sorted.filter(function(c){return c.amount>0;});
  var nowY=new Date().getFullYear();
  var minY=w.length?parseInt(w[0].date.slice(0,4),10):nowY;
  var maxY=Math.max(nowY,w.length?parseInt(w[w.length-1].date.slice(0,4),10):nowY);
  var html='<div class="fade">'+bar("입금 내역")
    +'<div class="metrics" id="m_contrib">'+contribMetricsHTML(stat)+'</div>';
  for(var y=maxY;y>=minY;y--){
    var yTotal=0;
    for(var m=1;m<=12;m++){var ym=y+"-"+(m<10?"0"+m:m);yTotal+=ymMap[ym]||0;}
    var open=!!ui.openYears[y];
    html+='<div class="ycard">'
      +'<button class="yhead" data-act="toggle-year" data-year="'+y+'">'
      +'<span class="ychev">'+(open?"\u25be":"\u25b8")+'</span>'
      +'<span class="yname">'+y+'년</span>'
      +'<span class="ytotal mono" id="yt_'+y+'">₩'+won(yTotal)+'</span></button>';
    if(open){
      var months="";
      for(var mm=1;mm<=12;mm++){
        var ym2=y+"-"+(mm<10?"0"+mm:mm);
        if(!multi){
          var amt=ymMap[ym2]||0;
          months+='<div class="mrow"><span class="mlabel">'+mm+'월</span>'
            +'<input class="input minput" data-edit="contrib" data-ym="'+ym2+'" data-b="'+(brokers[0]||{}).id+'" inputmode="decimal" value="'
            +(amt?won(amt):"")+'" placeholder="0"></div>';
        }else{
          var binputs=brokers.map(function(b){
            var bv=ymbMap[ym2+"|"+b.id]||0;
            return '<div class="field"><div class="fl">'+esc(b.name)+'</div>'
              +'<input class="cardinput" data-edit="contrib" data-ym="'+ym2+'" data-b="'+b.id+'" inputmode="decimal" value="'
              +(bv?won(bv):"")+'" placeholder="0"></div>';
          }).join("");
          months+='<div class="mrowm"><div class="mrowm-h"><b>'+mm+'월</b>'
            +'<span class="msub" id="ms_'+ym2+'">₩'+won(ymMap[ym2]||0)+'</span></div>'
            +'<div class="mrowm-b">'+binputs+'</div></div>';
        }
      }
      html+='<div class="mgrid'+(multi?" multi":"")+'">'+months+'</div>';
    }
    html+='</div>';
  }
  return html+'</div>';
}
function softContrib(acc){
  var stat=calcAccount(acc,state.prices);
  if(el("m_contrib"))el("m_contrib").innerHTML=contribMetricsHTML(stat);
  var ymMap={};
  stat.sorted.forEach(function(c){var k=c.date.slice(0,7);ymMap[k]=(ymMap[k]||0)+c.amount;});
  var nodes=document.querySelectorAll('[id^="yt_"]');
  for(var i=0;i<nodes.length;i++){
    var y=nodes[i].id.slice(3),t=0;
    for(var m=1;m<=12;m++){var ym=y+"-"+(m<10?"0"+m:m);t+=ymMap[ym]||0;}
    nodes[i].textContent="₩"+won(t);
  }
  var ms=document.querySelectorAll('[id^="ms_"]');
  for(var j=0;j<ms.length;j++){
    ms[j].textContent="₩"+won(ymMap[ms[j].id.slice(3)]||0);
  }
}

function foot(){

/* ===================== 뒤로 가기(브라우저 히스토리) 연동 ===================== */
/* 화면 = {계좌, 서브탭}. 화면이 바뀔 때마다 history 항목을 쌓고,
   기기/브라우저 '뒤로 가기'는 그 직전 화면으로 되돌린다.
   첫 화면에서 뒤로 가기를 누르면 우리 항목이 아니므로 앱이 정상 종료된다. */
var _navLast=null,_navPop=false;
function syncNav(){
  var scr=ui.accId+"|"+ui.tab;
  if(_navLast!==null&&_navLast!==scr&&!_navPop){
    try{history.pushState({accId:ui.accId,tab:ui.tab},"");}catch(e){}
  }
  _navLast=scr;
}
window.addEventListener("popstate",function(e){
  var s=e.state;
  if(!s||typeof s!=="object")return;
  ui.accId=s.accId;ui.tab=s.tab||"port";ui.showProxy=false;ui.showBrokers=false;
  _navPop=true;render();_navPop=false;
});
function render(){
  try{
    renderInner();
  }catch(err){
    try{
      el("app").innerHTML='<div class="empty fade">'
        +'화면을 그리는 중 오류가 발생했습니다.<br>'
        +'<span class="note">'+esc(String(err&&err.message||err))+'</span><br>'
        +'<button class="btn" data-act="export" style="margin-top:16px">백업 내보내기</button>'
        +'<button class="ghost" data-act="reset" style="margin-top:8px">초기 데이터로 재설정</button></div>';
    }catch(e2){}
  }
}
function renderInner(){
  buildPills();
  var app=el("app"),html="";
  var acc=activeAcc();
  if(!acc&&state.accounts.length){ui.accId=state.accounts[0].id;acc=state.accounts[0];}
  if(!acc){
    html='<div class="empty fade">아직 계좌가 없습니다.<br>'
      +'<button class="btn" data-act="add-acc" style="margin-top:16px">+ 계좌 만들기</button></div>';
  }else{
    var st=function(k,label){return '<button class="subtab'+(ui.tab===k?" on":"")
      +'" data-act="tab" data-tab="'+k+'">'+label+'</button>';};
    html='<div class="subtabs">'+st("port","포트폴리오")+st("rebal","리밸런싱")+st("contrib","입금 내역")+'</div>';
    if(ui.tab==="port")html+=viewPort(acc);
    else if(ui.tab==="rebal")html+=viewRebal(acc);
    else html+=viewContrib(acc);
    if(ui.tab==="contrib")html+=foot();
  }
  app.innerHTML=html;
  syncNav();
}
function softRefresh(){
  var acc=activeAcc();if(!acc)return;
  if(ui.tab==="port")softPort(acc);
  else if(ui.tab==="rebal")softRebal(acc);
}

/* ===================== 이벤트 ===================== */
function patch(fn){fn();save();}
var undoState=null;   // 직전 리밸런싱 되돌리기용 스냅샷
function applyRebalance(acc){
  var stat=calcAccount(acc,state.prices);
  var pend=pendingContrib(acc);
  var rb=calcRebalance(acc,state.prices,stat,pend.amount);
  if(Math.abs(rb.wsum-100)>0.5){toast("목표 비중 합계가 100%가 아닙니다.");return;}
  var moves=rb.rows.filter(function(r){return r.adjQty!==0;});
  if(!moves.length){toast("이미 목표 비중에 맞춰져 있습니다.");return;}
  var rowsHtml=rb.rows.map(function(r){
    var act=r.adjQty>0?'<span style="color:'+C.coral+'">매수 '+r.adjQty+'주</span>'
      :r.adjQty<0?'<span style="color:'+C.mint+'">매도 '+(-r.adjQty)+'주</span>'
      :'<span style="color:'+C.txt3+'">변동 없음</span>';
    return '<div class="msum"><span>'+esc(r.h.name||r.h.code||"—")+'</span>'+act+'</div>';
  }).join("");
  var body='<div class="msumwrap">'+rowsHtml+'</div>'
    +'<div class="msum" style="border-top:1px solid var(--line);margin-top:4px;padding-top:9px">'
    +'<span>리밸런싱 후 잔여 현금</span><b>₩'+won(rb.leftover)+'</b></div>'
    +((acc.brokers&&acc.brokers.length>1)
      ?'<p class="mtext" style="margin-top:8px">매수·매도 수량은 증권계좌별 보유 비율에 따라 자동 분배됩니다.</p>':"")
    +(pend.amount>0?'<p class="mtext" style="margin-top:8px">입금 내역의 ₩'+won(pend.amount)
      +' 이 반영되며, 실행 후 되돌릴 수 있습니다.</p>'
      :'<p class="mtext" style="margin-top:8px">실행 후 되돌릴 수 있습니다.</p>');
  modal({title:"리밸런싱 실행",body:body,okText:"실행",onOk:function(){
    undoState=JSON.parse(JSON.stringify(state));
    var brokerSpend={};   // 증권계좌별 순매매대금(+매수)
    rb.rows.forEach(function(r){
      var h=r.h,delta=r.adjQty;
      var w=h.lots.map(function(l){return l.qty||0;});
      var d=distributeDelta(w,delta);
      h.lots.forEach(function(l,li){
        var dq=d[li]||0;
        brokerSpend[l.b]=(brokerSpend[l.b]||0)+dq*r.price;
        if(dq>0){
          l.cost=(l.cost||0)+dq*r.price;                          // 매수분 매입금액 가산
        }else if(dq<0){
          var oq=l.qty||0;
          l.cost=oq>0?Math.round((l.cost||0)*(oq+dq)/oq):0;       // 매도분 비례 차감
        }
        l.qty=(l.qty||0)+dq;
      });
    });
    var pendByB=pend.byBroker||{};
    acc.brokers.forEach(function(b){
      // 새 예수금 = 기존 예수금 + 이번 납입 − 매수대금(+매도금 회수)
      b.cash=Math.round((b.cash||0)+(pendByB[b.id]||0)-(brokerSpend[b.id]||0));
    });
    acc.deployedYM=latestYM(acc)||acc.deployedYM||"";   // 현재까지의 납입 = 모두 반영 완료
    save();render();
    toast("리밸런싱이 적용되었습니다.");
  }});
}
function undoRebalance(){
  if(!undoState)return;
  state=undoState;undoState=null;save();render();
  toast("직전 상태로 되돌렸습니다.");
}
function exportData(){
  var blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="rebalancer-backup-"+todayStr()+".json";
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(function(){URL.revokeObjectURL(a.href);},1500);
  state.lastBackup=Date.now();save();
  toast("백업 파일을 저장했습니다.");
}

el("app").addEventListener("click",function(e){
  var t=e.target.closest("[data-act]");if(!t)return;
  var act=t.getAttribute("data-act");
  var acc=activeAcc();
  if(act==="tab"){ui.tab=t.getAttribute("data-tab");render();}
  else if(act==="toggle-year"){var ty=t.getAttribute("data-year");ui.openYears[ty]=!ui.openYears[ty];render();}
  else if(act==="del-acc"){
    confirmModal("계좌 삭제","이 계좌를 삭제할까요? 되돌릴 수 없습니다.",function(){
      patch(function(){state.accounts=state.accounts.filter(function(a){return a.id!==ui.accId;});});
      ui.accId=null;render();toast("계좌를 삭제했습니다.");
    },true,"삭제");}
  else if(act==="add-h"){patch(function(){
    acc.holdings.push({id:uid(),code:"",name:"새 종목",weight:0,
      lots:(acc.brokers||[]).map(function(b){return {b:b.id,qty:0,cost:0};})});});render();}
  else if(act==="del-h"){var hid=t.getAttribute("data-id");
    patch(function(){acc.holdings=acc.holdings.filter(function(h){return h.id!==hid;});});render();}
  else if(act==="equalize"){var n=acc.holdings.length||1;var w=Math.round(1000/n)/10;
    patch(function(){acc.holdings.forEach(function(h){h.weight=w;});});render();}
  else if(act==="normalize"){
    var sum=acc.holdings.reduce(function(s,h){return s+(h.weight||0);},0);
    if(sum<=0){toast("먼저 목표비중을 입력하세요.");return;}
    patch(function(){acc.holdings.forEach(function(h){
      h.weight=Math.round((h.weight||0)/sum*1000)/10;});});render();toast("비중을 100%로 맞췄습니다.");}
  else if(act==="apply-rebal"){applyRebalance(acc);}
  else if(act==="undo-rebal"){undoRebalance();}
  else if(act==="acc-move"){
    var dir=parseInt(t.getAttribute("data-dir"),10);
    var arr=state.accounts,idx=arr.map(function(a){return a.id;}).indexOf(ui.accId);
    var ni=idx+dir;
    if(idx>=0&&ni>=0&&ni<arr.length){
      patch(function(){var tmp=arr[idx];arr[idx]=arr[ni];arr[ni]=tmp;});render();}}
  else if(act==="quick-contrib"){
    var qym=todayStr().slice(0,7),qbs=acc.brokers||[];
    var setC=function(bid,amt){
      var ex=null;
      for(var i=0;i<acc.contributions.length;i++){
        var c=acc.contributions[i];
        if(c.date.slice(0,7)===qym&&c.b===bid){ex=c;break;}}
      if(ex)ex.amount=amt;
      else acc.contributions.push({id:uid(),date:qym+"-01",amount:amt,b:bid});
      save();render();toast("입금 내역이 저장되었습니다.");
    };
    if(qbs.length<=1){
      var cur=(acc.contributions||[]).filter(function(c){return c.date.slice(0,7)===qym;})[0];
      promptModal("이번 달 입금 ("+qym+")","예: 500000",cur?String(cur.amount):"",function(v){
        setC((qbs[0]||{}).id,num(v));},true);
    }else{
      var opts=qbs.map(function(b){return '<option value="'+b.id+'">'+esc(b.name)+'</option>';}).join("");
      modal({title:"이번 달 입금 ("+qym+")",
        body:'<div class="fl">증권계좌</div>'
          +'<select class="minput-f" data-mfield="broker" style="margin-bottom:11px">'+opts+'</select>'
          +'<div class="fl">입금액</div>'
          +'<input class="minput-f" data-minput data-mfield="amount" inputmode="decimal" placeholder="예: 500000">',
        okText:"저장",onOk:function(val,fields){
          if(fields&&fields.broker)setC(fields.broker,num(fields.amount));
        }});
    }}
  else if(act==="refresh-prices"){refreshPrices(false);}
  else if(act==="toggle-proxy"){ui.showProxy=!ui.showProxy;render();}
  else if(act==="toggle-brokers"){ui.showBrokers=!ui.showBrokers;render();}
  else if(act==="add-broker"){
    promptModal("증권계좌 추가","증권사 이름 (예: 키움증권)","",function(name){
      var bid=uid();
      acc.brokers.push({id:bid,name:name});
      acc.holdings.forEach(function(h){h.lots=h.lots||[];h.lots.push({b:bid,qty:0,cost:0});});
      ui.showBrokers=true;save();render();toast("증권계좌를 추가했습니다.");
    });}
  else if(act==="rename-broker"){
    var rbid=t.getAttribute("data-b");
    var rbk=(acc.brokers||[]).filter(function(b){return b.id===rbid;})[0];
    if(rbk)promptModal("증권계좌 이름 변경","증권사 이름",rbk.name,function(name){
      rbk.name=name;save();render();});}
  else if(act==="del-broker"){
    if((acc.brokers||[]).length<=1){toast("증권계좌는 최소 1개 필요합니다.");return;}
    var dbid=t.getAttribute("data-b");
    var dbk=acc.brokers.filter(function(b){return b.id===dbid;})[0];
    confirmModal("증권계좌 삭제","'"+(dbk?dbk.name:"")+"' 계좌를 삭제합니다. 종목별 매입수량·금액은 삭제되고, 예수금과 입금 내역은 다른 증권계좌로 합쳐집니다. 계속할까요?",function(){
      var keep=acc.brokers.filter(function(b){return b.id!==dbid;});
      var into=keep[0];
      if(into&&dbk)into.cash=(into.cash||0)+(dbk.cash||0);
      (acc.contributions||[]).forEach(function(c){if(c.b===dbid&&into)c.b=into.id;});
      acc.brokers=keep;
      acc.holdings.forEach(function(h){h.lots=(h.lots||[]).filter(function(l){return l.b!==dbid;});});
      consolidate(state);save();render();toast("증권계좌를 삭제했습니다.");
    },true,"삭제");}
  else if(act==="copy-worker"){
    try{navigator.clipboard.writeText(WORKER_CODE);toast("Worker 코드를 복사했습니다.");}
    catch(e){toast("복사 실패 — 코드를 길게 눌러 직접 복사하세요.");}}
  else if(act==="add-acc"){addAccount();}
  else if(act==="export"){exportData();}
  else if(act==="import"){el("importer").click();}
  else if(act==="reset"){
    confirmModal("초기화","모든 데이터를 초기 상태로 되돌릴까요? 현재 데이터가 사라집니다.",function(){
      state=consolidate(seed());undoState=null;save();ui.accId=null;ui.showBrokers=false;render();toast("초기 데이터로 재설정했습니다.");
    },true,"초기화");}
});

var contribToastTimer=null;
el("app").addEventListener("input",function(e){
  var t=e.target;var f=t.getAttribute("data-edit");if(!f)return;
  var acc=activeAcc();
  if(f==="acc-name"&&acc){acc.name=t.value;buildPills();save();return;}

    var ckb=(acc.brokers||[]).filter(function(b){return b.id===t.getAttribute("data-b");})[0];

  if(f==="proxyurl"){state.proxyUrl=t.value.trim();save();return;}
  if(f==="contrib"&&acc){
    var ym=t.getAttribute("data-ym"),cbid=t.getAttribute("data-b"),cv=num(t.value),ent=null;
    for(var ci=0;ci<acc.contributions.length;ci++){
      var cc=acc.contributions[ci];
      if(cc.date.slice(0,7)===ym&&cc.b===cbid){ent=cc;break;}}
    if(ent)ent.amount=cv;
    else if(cv>0)acc.contributions.push({id:uid(),date:ym+"-01",amount:cv,b:cbid});
    save();softContrib(acc);
    clearTimeout(contribToastTimer);
    contribToastTimer=setTimeout(function(){toast("입금 내역 저장됨");},700);
    return;}
  if(!acc)return;
  var id=t.getAttribute("data-id");
  var h=acc.holdings.filter(function(x){return x.id===id;})[0];
  if(!h)return;
  if(f==="h-name")h.name=t.value;
  else if(f==="h-code")h.code=t.value;
  else if(f==="lot-qty"){lotFor(h,t.getAttribute("data-b")).qty=Math.max(0,num(t.value));}
  else if(f==="lot-cost"){lotFor(h,t.getAttribute("data-b")).cost=Math.max(0,num(t.value));}
  else if(f==="weight")h.weight=Math.max(0,num(t.value));
  save();softRefresh();
});

/* 백업 불러오기 */
el("importer").addEventListener("change",function(e){
  var file=e.target.files[0];if(!file)return;
  var rd=new FileReader();
  rd.onload=function(){
    try{
      var data=JSON.parse(rd.result);
      if(!data||typeof data!=="object"||!Array.isArray(data.accounts))
        throw new Error("형식 오류");
      state=consolidate(data);undoState=null;save();ui.accId=null;ui.tab="port";render();
      toast("백업을 불러왔습니다.");
    }catch(err){toast("올바른 백업 파일이 아닙니다.");}
    el("importer").value="";
  };
  rd.readAsText(file);
});

/* ===================== 시작 ===================== */
state=consolidate(load()||seed());
render();
try{history.replaceState({accId:ui.accId,tab:ui.tab},"");}catch(e){}
/* 앱 열 때 시세 자동 갱신 (최근 10분 내 갱신했으면 생략) */
if(!state.lastFetch||(Date.now()-state.lastFetch>600000)){
  setTimeout(function(){refreshPrices(true);},400);
}

/* PWA: 서비스워커 등록 */
if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});}
</script>
