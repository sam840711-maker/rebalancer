<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>리밸런서</title>
<meta name="theme-color" content="#0c0e0d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="리밸런서">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root{
  --bg:#0c0e0d; --bg2:#131614; --bg3:#1b201d; --line:#262b27; --line2:#343d38;
  --txt:#e9efea; --txt2:#8b968f; --txt3:#5e6a63;
  --mint:#4ade80; --coral:#fb7185; --gold:#f5b942; --blue:#609cf6;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;}
body{
  background:radial-gradient(900px 500px at 80% -8%,#16201b 0%,var(--bg) 55%) no-repeat;
  background-color:var(--bg); min-height:100vh;
  color:var(--txt); font-family:'IBM Plex Sans KR',sans-serif;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1180px;margin:0 auto;padding:0 16px;}
.mono{font-family:'IBM Plex Mono',monospace;}
.fade{animation:fade .35s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
header{padding-top:calc(18px + env(safe-area-inset-top));}
.brand{font-size:19px;font-weight:800;letter-spacing:-.02em;}
.brand b{color:var(--mint);}
.tagline{font-size:11px;color:var(--txt3);font-weight:500;margin-left:8px;
  flex-shrink:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.topbtns{margin-left:auto;flex-shrink:0;display:flex;gap:6px;align-self:center;}
.backupbtn{flex-shrink:0;
  background:var(--bg3);color:var(--mint);
  border:1px solid var(--line2);border-radius:9px;
  padding:7px 11px;font-size:12px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:.15s;white-space:nowrap;}
.backupbtn:hover{border-color:var(--mint);}
.backupbtn:active{transform:scale(.96);}
.backupbtn:disabled{opacity:.35;pointer-events:none;}
.fxchip{flex-shrink:0;background:var(--bg3);border:1px solid var(--line);color:var(--txt);
  border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;transition:.15s;letter-spacing:.01em;
  display:inline-flex;align-items:center;gap:6px;line-height:1;}
.fxchip:hover{border-color:var(--mint);}
.fxchip:active{transform:scale(.96);}
.fxchip:disabled{opacity:.55;pointer-events:none;}
.fxchip.spin{animation:fxspin 1s linear infinite;color:var(--mint);}
.fxchip .fxsym{font-size:9.5px;color:var(--txt3);font-weight:600;letter-spacing:.04em;}
.fxchip .fxlbl{font-size:10px;color:var(--txt3);font-weight:700;letter-spacing:.04em;
  font-family:"Pretendard Variable","Pretendard",system-ui,sans-serif;}
@keyframes fxspin{0%{opacity:1}50%{opacity:.45}100%{opacity:1}}
.pills{display:flex;gap:7px;margin-top:15px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none;}
.pills::-webkit-scrollbar{display:none;}
.pill{background:var(--bg2);border:1px solid var(--line);color:var(--txt2);
  padding:8px 15px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;
  white-space:nowrap;font-family:inherit;transition:.15s;}
.pill:hover{color:var(--txt);}
.pill.on{background:var(--mint);color:#06140c;border-color:var(--mint);}
.pill.add{background:transparent;border:1px dashed var(--line2);color:var(--txt3);font-size:12px;}
.pill.add:hover{color:var(--mint);border-color:var(--mint);}
.subtabs{display:flex;gap:2px;margin:20px 0 4px;border-bottom:1px solid var(--line);}
.subtab{background:none;border:none;color:var(--txt3);font-family:inherit;font-size:13px;
  font-weight:600;padding:9px 14px;cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-1px;transition:.15s;}
.subtab:hover{color:var(--txt2);}
.subtab.on{color:var(--txt);border-bottom-color:var(--mint);}
.subtab:disabled{opacity:.32;cursor:default;}
.row{display:flex;align-items:center;}
.sectionbar{display:flex;align-items:center;justify-content:space-between;margin:26px 0 12px;}
.sectionbar h3{margin:0;font-size:14px;font-weight:700;letter-spacing:-.01em;}
.tick{width:4px;height:14px;background:var(--mint);border-radius:2px;display:inline-block;margin-right:8px;
  vertical-align:-1px;}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:620px){.metrics{grid-template-columns:repeat(2,1fr);}}
.metric{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px 15px;}
.metric .ml{color:var(--txt3);font-size:11px;letter-spacing:.04em;font-weight:600;}
.metric .mv{font-family:'IBM Plex Mono',monospace;font-size:21px;font-weight:600;margin-top:6px;line-height:1.1;}
.metric .ms{color:var(--txt3);font-size:11px;margin-top:4px;font-family:'IBM Plex Mono',monospace;}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:16px;margin-top:12px;}
.input{background:var(--bg3);border:1px solid var(--line);border-radius:7px;padding:6px 9px;
  font-size:13px;font-family:'IBM Plex Mono',monospace;outline:none;transition:.15s;color:var(--txt);}
.input.t{font-family:'IBM Plex Sans KR',sans-serif;}
.input:focus{border-color:var(--mint);background:#1f2521;}
.input::placeholder{color:var(--txt3);}
.titleinput{background:none;border:none;border-bottom:1px solid transparent;color:var(--txt);
  font-size:20px;font-weight:800;font-family:inherit;outline:none;padding:2px 0;letter-spacing:-.02em;}
.titleinput:focus{border-bottom-color:var(--mint);}
.tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;}
table{width:100%;border-collapse:collapse;min-width:600px;}
th{background:var(--bg2);color:var(--txt3);font-size:11px;font-weight:600;text-align:right;
  padding:10px 12px;letter-spacing:.03em;border-bottom:1px solid var(--line);white-space:nowrap;}
td{padding:9px 12px;text-align:right;font-size:13px;border-bottom:1px solid var(--line);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
td.num{font-family:'IBM Plex Mono',monospace;}
td.dim{color:var(--txt2);}
tr.total td{background:var(--bg2);font-weight:700;color:var(--txt);
  font-family:'IBM Plex Mono',monospace;border-top:1px solid var(--line2);}
tr.total td.lbl{font-family:'IBM Plex Sans KR';}
.badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px;font-family:'IBM Plex Sans KR';}
.badge.buy{background:rgba(251,113,133,.15);color:var(--coral);}
.badge.sell{background:rgba(74,222,128,.15);color:var(--mint);}
.x{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:12px;padding:4px;transition:.15s;}
.x:hover{color:var(--coral);}
.btn{background:var(--mint);color:#06140c;border:none;border-radius:9px;padding:10px 18px;
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.btn:hover{background:#6ee79a;}
.btn:disabled{background:var(--line2);color:var(--txt3);cursor:not-allowed;}
.ghost{background:var(--bg3);color:var(--txt2);border:1px solid var(--line);border-radius:8px;
  padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;}
.ghost:hover{color:var(--txt);border-color:var(--line2);}
.ghost.sm{padding:5px 9px;font-size:12px;}
.ghost:disabled{opacity:.4;cursor:default;}
.accrow{display:flex;align-items:center;gap:14px;width:100%;background:var(--bg2);
  border:1px solid var(--line);border-radius:11px;padding:14px 16px;cursor:pointer;
  font-family:inherit;transition:.15s;text-align:left;}
.accrow:hover{border-color:var(--mint);background:#161b18;}
.legrow{display:flex;align-items:center;gap:8px;padding:4px 0;}
.dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.lbl{font-size:11px;color:var(--txt3);font-weight:600;margin-bottom:4px;}
.note{color:var(--txt3);font-size:11px;line-height:1.6;}
.foot{display:flex;gap:8px;flex-wrap:wrap;margin-top:30px;padding-top:18px;border-top:1px solid var(--line);}
.gdcard{margin-top:14px;background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:14px 15px;}
.gdhead{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.gdtitle{font-size:13.5px;font-weight:700;color:var(--txt);margin-right:auto;}
.gddot{width:8px;height:8px;border-radius:50%;background:var(--txt3);flex-shrink:0;}
.gddot.on{background:#4ade80;box-shadow:0 0 0 3px rgba(74,222,128,.15);}
.gdtxt{font-size:11.5px;color:var(--txt3);font-weight:600;}
.gdbtns{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px;}
.gdpicklist{display:flex;flex-direction:column;gap:7px;max-height:50vh;overflow-y:auto;}
.settings .setsec{margin-top:16px;background:var(--bg2);border:1px solid var(--line);
  border-radius:13px;padding:15px 16px;}
.settings .setsec-t{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:11px;
  letter-spacing:.01em;}
.settings .setsec.danger{border-color:rgba(248,113,113,.25);}
.settings .setsec.danger .setsec-t{color:var(--coral);}
.settings .setrow{display:flex;gap:8px;flex-wrap:wrap;}
.gdpick{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;
  text-align:left;background:var(--bg3);border:1px solid var(--line);border-radius:10px;
  padding:12px 14px;color:var(--txt);font-size:13.5px;font-weight:600;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;}
.gdpick:active{background:var(--bg2);}
.gdpick-when{flex:1;}
.gdpick-tag{font-size:10px;font-weight:700;color:var(--mint);background:rgba(74,222,128,.12);
  padding:2px 8px;border-radius:6px;letter-spacing:.03em;}
.gdpick-tag.legacy{color:var(--gold);background:rgba(245,185,66,.12);}
.verline{margin:8px 0 26px;text-align:center;font-size:11px;color:var(--txt3);
  letter-spacing:.02em;font-family:'IBM Plex Mono',monospace;}
.verline b{color:var(--txt2);font-weight:600;}
.divider{height:34px;width:1px;background:var(--line);}
.empty{text-align:center;color:var(--txt2);padding:64px 20px;font-size:14px;line-height:1.9;}
.linkbtn{background:none;border:none;color:var(--txt3);font-family:inherit;font-size:11px;cursor:pointer;text-decoration:underline;padding:0;}
.linkbtn:hover{color:var(--mint);}
.codebox-wrap{margin-top:12px;}
.codebox{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--txt2);overflow-x:auto;white-space:pre;line-height:1.5;margin:0;}
.ycard{background:var(--bg2);border:1px solid var(--line);border-radius:12px;margin-top:10px;overflow:hidden;}
.yhead{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;padding:15px 16px;cursor:pointer;font-family:inherit;text-align:left;transition:.12s;}
.yhead:hover{background:var(--bg3);}
.ychev{color:var(--txt3);font-size:11px;width:12px;flex-shrink:0;}
.yname{font-size:15px;font-weight:700;letter-spacing:-.01em;color:var(--txt);}
.ytotal{font-size:15px;color:var(--mint);font-weight:600;margin-left:auto;}
.mgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px 14px;padding:8px 16px 16px;border-top:1px solid var(--line);}
.mrow{display:flex;align-items:center;gap:8px;min-width:0;}
.mlabel{font-size:12px;color:var(--txt3);width:30px;flex-shrink:0;text-align:right;font-weight:600;}
.minput{flex:1;text-align:right;min-width:0;}
.mgrid.multi{grid-template-columns:1fr;gap:0;padding:2px 0 4px;}
.mrowm{padding:11px 16px;border-top:1px solid var(--line);}
.mgrid.multi .mrowm:first-child{border-top:none;}
.mrowm-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.mrowm-h b{font-size:13px;color:var(--txt2);font-weight:700;}
.msub{font-size:12px;color:var(--txt3);font-family:'IBM Plex Mono',monospace;}
.mrowm-b{display:flex;flex-wrap:wrap;gap:8px;}
.mrowm-b .field{flex:1;min-width:120px;}
.ccmonth{flex-direction:column;}
.ccline{display:grid;grid-template-columns:22px 1fr;align-items:center;gap:8px;width:100%;}
.ccline+.ccline{margin-top:6px;}
.ccline .cclbl{font-size:12px;font-weight:700;color:var(--txt3);text-align:center;}
.mrowm-b .field .ccline{margin-top:5px;}
/* ===================== 카드형 리디자인 ===================== */
.acchead{display:flex;align-items:center;gap:8px;margin-top:18px;flex-wrap:wrap;}
.hero{position:relative;overflow:hidden;
  background:linear-gradient(158deg,#172420 0%,var(--bg2) 62%);
  border:1px solid var(--line2);border-radius:18px;padding:20px 18px;margin-top:14px;}
.hero::after{content:"";position:absolute;right:-50px;top:-72px;width:200px;height:200px;
  background:radial-gradient(circle,rgba(74,222,128,.15),transparent 70%);pointer-events:none;}
.hero>*{position:relative;}
.hl{font-size:11px;color:var(--txt3);font-weight:600;letter-spacing:.07em;}
.hbig{font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:-.02em;
  font-size:clamp(26px,8.5vw,34px);margin-top:7px;line-height:1;}
.heropnl{display:inline-flex;align-items:center;gap:5px;margin-top:11px;
  font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;
  padding:5px 11px;border-radius:8px;}
.heropnl.pos{background:rgba(74,222,128,.14);color:var(--mint);}
.heropnl.neg{background:rgba(251,113,133,.14);color:var(--coral);}
.compbar{display:flex;gap:2px;height:11px;border-radius:6px;overflow:hidden;
  background:var(--bg3);margin-top:18px;}
.compbar i{height:100%;display:block;min-width:3px;}
.complegend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:12px;}
.cl{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--txt2);}
.cl .dot{width:8px;height:8px;border-radius:3px;flex-shrink:0;}
.cl b{font-family:'IBM Plex Mono',monospace;color:var(--txt);font-weight:600;margin-left:1px;}
.herodiv{height:1px;background:var(--line2);margin:16px 0 14px;}
.rbctrl{display:flex;align-items:flex-end;gap:12px;}
.wsumrow{display:flex;justify-content:space-between;align-items:center;margin-top:15px;
  font-size:12px;color:var(--txt3);font-weight:600;flex-wrap:wrap;gap:8px;}
.wsumrow .mono{font-size:13px;font-weight:600;}

.statline{display:flex;margin-top:10px;border:1px solid var(--line);
  border-radius:13px;overflow:hidden;background:var(--bg2);}
.stat{flex:1;min-width:0;padding:12px 3px;text-align:center;}
.stat+.stat{border-left:1px solid var(--line);}
.stat .sl{font-size:10px;color:var(--txt3);font-weight:600;white-space:nowrap;}
.stat .sv{font-family:'IBM Plex Mono',monospace;font-size:clamp(10px,3vw,13.5px);
  font-weight:600;letter-spacing:-.02em;margin-top:5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
@media(max-width:420px){
  .tagline{display:none;}
  .fxchip{padding:5px 8px;font-size:11px;}
  .fxchip .fxsym{display:none;}
}
@media(max-width:359px){
  .statline{flex-wrap:wrap;}
  .stat{flex-basis:50%;}
  .stat:nth-child(n+3){border-top:1px solid var(--line);}
  .stat:nth-child(3){border-left:none;}
}

.hcard,.rbcard{background:var(--bg2);border:1px solid var(--line);
  border-radius:14px;padding:15px;margin-top:10px;transition:border-color .15s;}
.hcard:hover,.rbcard:hover{border-color:var(--line2);}
.hcrow{display:flex;align-items:flex-start;gap:10px;}
.hcname{flex:1;min-width:0;}
.nameinput{background:none;border:none;border-bottom:1px solid transparent;
  color:var(--txt);font-size:15px;font-weight:700;font-family:inherit;
  outline:none;padding:1px 0;width:100%;letter-spacing:-.01em;}
.nameinput:focus{border-bottom-color:var(--mint);}
.codeinput{background:none;border:none;color:var(--txt3);
  font-family:'IBM Plex Mono',monospace;font-size:11px;outline:none;
  padding:3px 0 0;width:100%;}
.codeinput:focus{color:var(--mint);}
.hcval{display:flex;align-items:baseline;justify-content:space-between;
  gap:10px;margin-top:13px;}
.hcval .v{font-family:'IBM Plex Mono',monospace;font-size:21px;font-weight:600;}
.hcval .r{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;}
.wbar{height:7px;border-radius:4px;background:var(--bg3);overflow:hidden;margin-top:10px;}
.wbar i{display:block;height:100%;border-radius:4px;transition:width .35s ease;}
.wmeta{display:flex;justify-content:space-between;gap:8px;margin-top:7px;
  font-size:11px;color:var(--txt3);}
.wmeta b{font-family:'IBM Plex Mono',monospace;color:var(--txt2);font-weight:600;}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
.field{min-width:0;}
.fl{font-size:10px;color:var(--txt3);font-weight:600;margin-bottom:5px;letter-spacing:.02em;}
.cardinput{width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--line);
  border-radius:8px;padding:8px 9px;font-size:13px;
  font-family:'IBM Plex Mono',monospace;color:var(--txt);outline:none;
  text-align:right;transition:.15s;}
.cardinput:focus{border-color:var(--mint);background:#1f2521;}
.cardstatic{width:100%;box-sizing:border-box;background:transparent;
  border:1px solid var(--line);border-radius:8px;padding:8px 9px;font-size:13px;
  font-family:'IBM Plex Mono',monospace;color:var(--txt2);text-align:right;}
.cardstatic .sub{font-size:10px;color:var(--txt3);}

/* ===== 수정 모드 ===== */
.editbar{display:flex;align-items:center;justify-content:space-between;gap:10px;
  flex-wrap:wrap;background:var(--bg2);border:1px solid var(--mint);
  border-radius:12px;padding:10px 13px;margin:2px 0 12px;}
.ebl{font-size:12px;font-weight:700;color:var(--mint);}
.ebbtns{display:flex;gap:7px;flex-shrink:0;}
.btn.sm{padding:7px 16px;font-size:12.5px;}
.cardinput:disabled,.nameinput:disabled,.codeinput:disabled,.titleinput:disabled{
  opacity:1;-webkit-text-fill-color:currentColor;cursor:default;}
.cardinput:disabled{background:transparent;border-color:var(--line);color:var(--txt);}
.nameinput:disabled,.codeinput:disabled,.titleinput:disabled{
  background:transparent;border-color:transparent;}
.cashcard{display:flex;align-items:center;gap:12px;background:var(--bg2);
  border:1px dashed var(--line2);border-radius:14px;padding:14px 15px;margin-top:10px;}

.rbtop{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
.rbname{font-size:15px;font-weight:700;letter-spacing:-.01em;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rbcode{font-family:'IBM Plex Mono',monospace;font-size:11px;
  color:var(--txt3);flex-shrink:0;}
.wt{display:flex;align-items:center;gap:8px;margin-top:13px;}
.wt .wl{font-size:11px;color:var(--txt3);font-weight:600;}
.wtinput{width:60px;background:var(--bg3);border:1px solid var(--line);
  border-radius:7px;padding:6px 8px;font-family:'IBM Plex Mono',monospace;
  font-size:14px;text-align:right;color:var(--txt);outline:none;transition:.15s;}
.wtinput:focus{border-color:var(--mint);background:#1f2521;}
.rbtarget{font-size:13px;color:var(--mint);font-weight:600;}
.rbflow{display:flex;align-items:center;justify-content:space-between;
  gap:10px;margin-top:13px;padding-top:12px;border-top:1px solid var(--line);}
.rbqty{font-size:12px;color:var(--txt2);}
.rbqty b{font-family:'IBM Plex Mono',monospace;color:var(--txt);
  font-weight:600;font-size:14px;}
.arrow{color:var(--txt3);margin:0 5px;}
.rbtrade{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.rbprice{text-align:right;font-size:11.5px;color:var(--txt3);
  margin-top:6px;min-height:1px;}
.rbprice b{font-family:'IBM Plex Mono',monospace;color:var(--txt);font-weight:600;}
.rbprice .rblbl{font-weight:600;}
.rbprice .rbx{color:var(--txt3);}
.rbresult{display:flex;align-items:center;justify-content:space-between;
  gap:12px;background:var(--bg2);border:1px solid var(--line2);
  border-radius:14px;padding:15px;margin-top:14px;}

<script>
"use strict";
/* ===================== 유틸 ===================== */
var C={mint:"#4ade80",coral:"#fb7185",gold:"#f5b942",blue:"#609cf6",
  txt:"#e9efea",txt2:"#8b968f",txt3:"#5e6a63",line:"#262b27",bg3:"#1b201d"};
var SLICE=["#4ade80","#609cf6","#f5b942","#fb7185","#a78bfa","#22d3ee"];
var APP_VER="v0.10b";   // 빌드 버전 (하단 표시)
function uid(){return Math.random().toString(36).slice(2,9);}
function won(n){return Math.round(n||0).toLocaleString("ko-KR");}
function pct(n){return (n>=0?"+":"")+(n*100).toFixed(2)+"%";}
function pct0(n){return (n*100).toFixed(1)+"%";}
function todayStr(){return new Date().toISOString().slice(0,10);}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});}
function num(v){var d=String(v).replace(/[^0-9.\-]/g,"");var n=parseFloat(d);return isNaN(n)?0:n;}
/* 통화별 표시/입력 포맷 — KRW는 정수, USD는 소수 허용 */
function numFmt(n,dp){n=+n||0;return n.toLocaleString("ko-KR",{minimumFractionDigits:0,maximumFractionDigits:dp==null?0:dp});}
function moneyInputVal(n,ccy){return ccy==="USD"?numFmt(n,2):won(n);}   // 매입금액 입력칸 표시값
function qtyInputVal(n,ccy){return ccy==="USD"?numFmt(n,4):won(n);}     // 수량 입력칸 표시값 (USD 소수점 매수)
function monthsBetween(from){var a=new Date(from),b=new Date();
  var m=(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth());
  if(b.getDate()<a.getDate())m-=1;return Math.max(m,0);}
function daysBetween(from){return Math.max((new Date()-new Date(from))/86400000,1);}
function el(id){return document.getElementById(id);}
function setT(id,text,color){var e=el(id);if(!e)return;e.textContent=text;if(color)e.style.color=color;}

/* ===================== 인앱 모달 · 토스트 ===================== */
function toast(msg){
  var t=el("toast");if(!t)return;
  t.textContent=msg;t.className="toast show";
  clearTimeout(toast._t);toast._t=setTimeout(function(){t.className="toast";},2400);
}
/* opts: {title, body(HTML), okText, cancelText(null이면 숨김), danger, onOk(val)} */
function modal(opts){
  var ov=el("modal");
  ov.innerHTML='<div class="mbox">'
    +'<div class="mtitle">'+esc(opts.title||"")+'</div>'
    +'<div class="mbody">'+(opts.body||"")+'</div>'
    +'<div class="mbtns">'
    +(opts.cancelText===null?"":'<button class="ghost" data-m="cancel">'+esc(opts.cancelText||"취소")+'</button>')
    +'<button class="btn'+(opts.danger?" danger":"")+'" data-m="ok">'+esc(opts.okText||"확인")+'</button>'
    +'</div></div>';
  ov.className="modal show";
  modal._onOk=opts.onOk||function(){};
  modal._onCancel=opts.onCancel||null;
  var inp=ov.querySelector("[data-minput]");
  if(inp)setTimeout(function(){try{inp.focus();inp.select();}catch(e){}},60);
}
function closeModal(){var ov=el("modal");ov.className="modal";ov.innerHTML="";modal._onCancel=null;}
function confirmModal(title,text,onOk,danger,okText){
  modal({title:title,body:'<p class="mtext">'+esc(text)+'</p>',
    okText:okText||"확인",danger:danger,onOk:function(){onOk();}});
}
function promptModal(title,placeholder,defVal,onOk,numeric){
  modal({title:title,
    body:'<input class="minput-f" data-minput type="text"'+(numeric?' inputmode="decimal"':'')
      +' value="'+esc(defVal||"")+'" placeholder="'+esc(placeholder||"")+'">',
    okText:"확인",
    onOk:function(val){if(val!=null&&String(val).trim())onOk(String(val).trim());}});
}
el("modal").addEventListener("click",function(e){
  var allBtn=e.target.closest("[data-mall]");
  if(allBtn){
    var boxes=el("modal").querySelectorAll('input[type="checkbox"][data-mfield]');
    var anyOff=false,bi;
    for(bi=0;bi<boxes.length;bi++)if(!boxes[bi].checked){anyOff=true;break;}
    for(bi=0;bi<boxes.length;bi++)boxes[bi].checked=anyOff;
    allBtn.textContent=anyOff?"전체 해제":"전체 선택";
    return;
  }
  if(e.target.closest("[data-mlookup]")){e.preventDefault();modalLookup();return;}
  var gp=e.target.closest("[data-gdpick]");
  if(gp){
    e.preventDefault();
    var fid=gp.getAttribute("data-gdpick");
    closeModal();
    toast("백업을 불러오는 중…");
    gdGetTokenSmart().then(function(){return gdDownloadId(fid);})
      .then(function(txt){gdApplyRestoreText(txt);})
      .catch(function(err){toast("복원 실패: "+((err&&err.message)||"오류"));});
    return;
  }
  if(e.target.closest('[data-act="use-suggested-proxy"]')){
    e.preventDefault();
    var pin=el("modal").querySelector('[data-mfield="purl"]');
    if(pin){pin.value=SUGGESTED_PROXY;try{pin.focus();}catch(e2){}}
    return;
  }
  var ccyBtn=e.target.closest(".ccytoggle button[data-ccy]");
  if(ccyBtn){e.preventDefault();setCcyToggle(ccyBtn.parentElement,ccyBtn.getAttribute("data-ccy"));return;}
  var b=e.target.closest("[data-m]");
  if(!b){if(e.target.id==="modal")closeModal();return;}
  var act=b.getAttribute("data-m");
  if(act==="cancel"){var cc=modal._onCancel;closeModal();if(cc)cc();return;}
  if(act==="ok"){
    var inp=el("modal").querySelector("[data-minput]");
    var val=inp?inp.value:null;
    var fields={},fl=el("modal").querySelectorAll("[data-mfield]");
    for(var fi=0;fi<fl.length;fi++){
      var fe=fl[fi];
      if(fe.type==="checkbox")fields[fe.getAttribute("data-mfield")]=fe.checked;
      else if(fe.classList&&fe.classList.contains("ccytoggle"))fields[fe.getAttribute("data-mfield")]=fe.getAttribute("data-val")||"KRW";
      else fields[fe.getAttribute("data-mfield")]=fe.value;
    }
    var cb=modal._onOk;
    closeModal();
    if(cb)cb(val,fields);
  }
});
el("modal").addEventListener("keydown",function(e){
  if(e.key==="Enter"){var ok=el("modal").querySelector('[data-m="ok"]');
    if(ok){e.preventDefault();ok.click();}}
  else if(e.key==="Escape")closeModal();
});

/* ===================== 초기 데이터 ===================== */
function seed(){
  function cs(rows,bid){return rows.map(function(r){return {id:uid(),date:r[0],memo:r[1],amount:r[2],b:bid,ccy:"KRW"};});}
  var bid=uid();
  return {prices:{"000001":10000,"000002":20000},priceCcy:{"000001":"KRW","000002":"KRW"},fxRate:1380,accounts:[
    {id:uid(),name:"예시 계좌",
     brokers:[{id:bid,name:"증권계좌",cashKRW:50000,cashUSD:0}],
     holdings:[
      {id:uid(),code:"000001",name:"예시 종목 A",ccy:"KRW",weight:60,lots:[{b:bid,qty:100,cost:900000}]},
      {id:uid(),code:"000002",name:"예시 종목 B",ccy:"KRW",weight:40,lots:[{b:bid,qty:50,cost:900000}]}],
     contributions:cs([["2025-01-02","초기 납입",2000000],
      ["2025-02-03","",300000],["2025-03-03","",300000]],bid)}
  ]};
}

/* ===================== 증권계좌(broker) · 매입 lot 헬퍼 ===================== */
/* 한 종목(holding)은 증권계좌별 lot 배열을 가진다: lots=[{b:brokerId,qty,cost},...]
   종목의 보유수량·총매입금액은 전 lot의 합계, 계좌 예수금은 전 broker.cash 의 합계다. */
function hQty(h){var s=0,L=h.lots||[],i;for(i=0;i<L.length;i++)s+=(L[i].qty||0);return s;}
function hCost(h){var s=0,L=h.lots||[],i;for(i=0;i<L.length;i++)s+=(L[i].cost||0);return s;}
/* 환율 (USD/KRW). 미설정 시 기본 1380. */
function fx(){var r=state&&state.fxRate;return (typeof r==="number"&&r>0)?r:1380;}
/* 통화 환산: ccy 기준 금액을 KRW로. 'USD'면 환율 곱, 그 외 그대로. */
function inKRW(amt,ccy){return ccy==="USD"?amt*fx():amt;}
/* 입금 1건의 KRW 환산 — USD는 기록된 입금시점 환율(fxAt) 사용, 없으면 현재환율 폴백.
   환차손익이 과거 시점에 소급 적용되지 않도록 함(XIRR/총수익률 정확도). */
function contribKRW(c){
  if(c.ccy!=="USD")return c.amount;
  var rate=(typeof c.fxAt==="number"&&c.fxAt>0)?c.fxAt:fx();
  return c.amount*rate;
}
function hCcy(h){return (h&&h.ccy==="USD")?"USD":"KRW";}
function accCashKRW(acc){var s=0,B=acc.brokers||[],i;for(i=0;i<B.length;i++)s+=(B[i].cashKRW||0);return s;}
function accCashUSD(acc){var s=0,B=acc.brokers||[],i;for(i=0;i<B.length;i++)s+=(B[i].cashUSD||0);return s;}
/* 전체 예수금 KRW 환산 (계산·표시 단일 기준) */
function accCash(acc){return accCashKRW(acc)+accCashUSD(acc)*fx();}
/* 통화 기호·서식 */
function ccySym(c){return c==="USD"?"$":"₩";}
function fmtMoney(amt,ccy){
  ccy=ccy||"KRW";
  if(ccy==="USD"){var n=+amt||0;return "$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
  return "₩"+won(amt);
}
function lotFor(h,bid){
  h.lots=h.lots||[];
  for(var i=0;i<h.lots.length;i++)if(h.lots[i].b===bid)return h.lots[i];
  var nl={b:bid,qty:0,cost:0};h.lots.push(nl);return nl;
}
/* ===================== 계산 ===================== */
function calcAccount(acc,prices){
  var fxR=fx();
  var rows=acc.holdings.map(function(h){
    var price=prices[h.code]||0,cost=hCost(h),value=price*hQty(h);
    var c=hCcy(h);
    var valueKRW=c==="USD"?value*fxR:value;
    var costKRW=c==="USD"?cost*fxR:cost;
    return {h:h,ccy:c,price:price,cost:cost,value:value,
      valueKRW:valueKRW,costKRW:costKRW,
      ret:cost>0?value/cost-1:0};});
  var stockValue=rows.reduce(function(s,r){return s+r.valueKRW;},0);   // KRW 환산
  var stockCost=rows.reduce(function(s,r){return s+r.costKRW;},0);
  rows.forEach(function(r){r.share=stockValue>0?r.valueKRW/stockValue:0;});
  var totalAsset=stockValue+accCash(acc);
  var sorted=acc.contributions.slice().sort(function(a,b){return a.date<b.date?-1:1;});
  var contributed=sorted.reduce(function(s,c){return s+contribKRW(c);},0);
  var pnl=totalAsset-contributed;
  var totalRet=contributed>0?pnl/contributed:0;
  var first=sorted[0]?sorted[0].date:null;
  var months=first?monthsBetween(first):0;
  var days=first?daysBetween(first):1;
  var cagr=(first&&contributed>0&&totalAsset>0&&days>=30)?xirr(sorted,totalAsset):null;
  return {rows:rows,stockValue:stockValue,stockCost:stockCost,totalAsset:totalAsset,
    contributed:contributed,pnl:pnl,totalRet:totalRet,months:months,cagr:cagr,first:first,sorted:sorted};
}
/* 리밸런싱: 현재 평가액 + 예수금을 기준(base)으로 각 종목의 목표수량을 구하고,
   현재 보유수량과의 차이만큼 매수/매도 수량을 산출한다(계획 표시 전용).
   1차: 내림으로 초과 매수 방지 → 2차: 남은 예수금으로 가장 부족한 종목부터 1주씩 추가. */
function calcRebalance(acc,prices,stat){
  var fxR=fx();
  var base=stat.stockValue+accCash(acc);   // 모두 KRW 기준
  var wsum=acc.holdings.reduce(function(s,h){return s+(h.weight||0);},0);
  var rows=acc.holdings.map(function(h){
    var price=prices[h.code]||0;             // 종목의 native 통화 시세
    var ccy=hCcy(h);
    var targetKRW=base*((h.weight||0)/100);
    var targetNative=ccy==="USD"?targetKRW/fxR:targetKRW;
    var targetQty=price>0?Math.floor(targetNative/price):0;
    return {h:h,ccy:ccy,price:price,
      targetAmt:targetKRW,targetNative:targetNative,targetQty:targetQty};});
  // 1차 floor 후 통화별 잔여 계산: 현재 예수금 + 매도금 - 매수금 (각자 native)
  var leftKRW=accCashKRW(acc),leftUSD=accCashUSD(acc);
  rows.forEach(function(r){
    var spend=(r.targetQty-hQty(r.h))*r.price;   // native ccy 차감
    if(r.ccy==="USD")leftUSD-=spend; else leftKRW-=spend;
  });
  // 2차: 자기 통화 잔여가 충분한 종목 중 목표대비 가장 부족한 종목 1주씩 추가
  for(var guard=0;guard<100000;guard++){
    var pick=null,best=-Infinity;
    rows.forEach(function(r){
      if(r.price<=0)return;
      var pool=r.ccy==="USD"?leftUSD:leftKRW;
      if(r.price>pool)return;
      var shortfall=r.targetNative-r.targetQty*r.price;   // native 부족분
      // 동등 비교 위해 KRW로 환산
      var sKRW=r.ccy==="USD"?shortfall*fxR:shortfall;
      if(sKRW>best){best=sKRW;pick=r;}
    });
    if(!pick)break;
    pick.targetQty++;
    if(pick.ccy==="USD")leftUSD-=pick.price; else leftKRW-=pick.price;
  }
  rows.forEach(function(r){
    r.adjQty=r.targetQty-hQty(r.h);
    r.tradeAmt=r.adjQty*r.price;                   // native ccy
    r.tradeAmtKRW=r.ccy==="USD"?r.tradeAmt*fxR:r.tradeAmt;
  });
  var investedKRW=rows.reduce(function(s,r){return s+(r.ccy==="USD"?r.targetQty*r.price*fxR:r.targetQty*r.price);},0);
  return {base:base,wsum:wsum,rows:rows,invested:investedKRW,
    leftKRW:leftKRW,leftUSD:leftUSD,
    leftover:leftKRW+leftUSD*fxR};
}

/* ===================== 연환산 수익률: XIRR (내부수익률) ===================== */
/* 각 납입 시점을 반영한 정확한 연 환산 수익률.
   납입금=음(-)의 현금유출, 현재 평가자산=양(+)의 유입으로 보고
   순현재가치(NPV)=0 이 되는 연이율 r 을 이분법으로 구한다. */
function xirr(conts,totalAsset){
  if(!conts.length||totalAsset<=0)return 0;
  var d0=new Date(conts[0].date).getTime();
  var flows=[];
  for(var i=0;i<conts.length;i++){
    var amtKRW=contribKRW(conts[i]);
    flows.push([(new Date(conts[i].date).getTime()-d0)/86400000,-amtKRW]);
  }
  flows.push([(Date.now()-d0)/86400000,totalAsset]);
  function npv(r){
    var s=0;
    for(var j=0;j<flows.length;j++)s+=flows[j][1]/Math.pow(1+r,flows[j][0]/365);
    return s;
  }
  var lo=-0.9999,hi=20;
  if(npv(hi)>=0)return hi;
  if(npv(lo)<=0)return lo;
  for(var k=0;k<200;k++){
    var mid=(lo+hi)/2;
    if(npv(mid)>0)lo=mid;else hi=mid;
  }
  return (lo+hi)/2;
}

/* ===================== 납입내역 월 단위 통합 ===================== */
function consolidate(st){
  if(!st||typeof st!=="object")st={};
  if(!Array.isArray(st.accounts))st.accounts=[];
  if(!st.prices||typeof st.prices!=="object")st.prices={};
  if(!st.priceCcy||typeof st.priceCcy!=="object")st.priceCcy={};   // 종목코드별 통화
  if(typeof st.fxRate!=="number"||!(st.fxRate>0))st.fxRate=1380;
  st.accounts.forEach(function(a){
    if(!a.id)a.id=uid();
    if(typeof a.name!=="string")a.name="계좌";
    if(!Array.isArray(a.holdings))a.holdings=[];
    if(!Array.isArray(a.contributions))a.contributions=[];
    /* 증권계좌(broker) 보장 — 최소 1개, broker는 cashKRW / cashUSD 두 통화의 예수금을 가진다 */
    if(!Array.isArray(a.brokers)||!a.brokers.length){
      a.brokers=[{id:uid(),name:"증권계좌",cashKRW:0,cashUSD:0}];
    }
    a.brokers.forEach(function(b,bi){
      if(!b.id)b.id=uid();
      if(typeof b.name!=="string"||!b.name)b.name="증권계좌 "+(bi+1);
      /* 옛 cash → cashKRW 이전 */
      if(typeof b.cash==="number"&&!isNaN(b.cash)){
        b.cashKRW=(b.cashKRW||0)+b.cash;
        delete b.cash;
      }
      if(typeof b.cashKRW!=="number"||isNaN(b.cashKRW))b.cashKRW=0;
      if(typeof b.cashUSD!=="number"||isNaN(b.cashUSD))b.cashUSD=0;  // USD는 음수 허용 (미결제)
    });
    /* 옛 계좌 단위 예수금 → 첫 broker.cashKRW 으로 */
    if(typeof a.cash==="number"&&!isNaN(a.cash)){
      a.brokers[0].cashKRW=(a.brokers[0].cashKRW||0)+a.cash;
    }
    delete a.cash;
    var brokerIds={};a.brokers.forEach(function(b){brokerIds[b.id]=1;});
    var firstBid=a.brokers[0].id;
    a.holdings.forEach(function(h){
      if(!h.id)h.id=uid();
      if(typeof h.code!=="string")h.code=String(h.code||"");
      if(typeof h.name!=="string")h.name=String(h.name||"");
      if(typeof h.weight!=="number"||isNaN(h.weight))h.weight=0;
      /* 통화 필드: 옛 데이터는 KRW로 간주, priceCcy에서 추론 가능하면 우선 적용 */
      if(h.ccy!=="USD"&&h.ccy!=="KRW"){
        var pc=st.priceCcy[h.code];
        h.ccy=(pc==="USD")?"USD":"KRW";
      }
      /* 옛 데이터(qty·cost·avg 단일값) → lots 배열로 변환 */
      if(!Array.isArray(h.lots)){
        var oq=(typeof h.qty==="number"&&!isNaN(h.qty))?h.qty:0;
        var oc=(typeof h.cost==="number"&&!isNaN(h.cost))?h.cost
              :Math.round((typeof h.avg==="number"?h.avg:0)*oq);
        h.lots=[{b:firstBid,qty:oq,cost:oc}];
      }
      h.lots=h.lots.filter(function(l){return l&&brokerIds[l.b];});
      h.lots.forEach(function(l){
        if(typeof l.qty!=="number"||isNaN(l.qty))l.qty=0;
        if(typeof l.cost!=="number"||isNaN(l.cost))l.cost=0;
      });
      var byB={};h.lots.forEach(function(l){byB[l.b]=l;});
      h.lots=a.brokers.map(function(b){return byB[b.id]||{b:b.id,qty:0,cost:0};});
      delete h.qty;delete h.cost;delete h.avg;
    });
    /* 입금 내역: 월 + 증권계좌 + 통화 단위로 합산. USD는 입금 시점 환율(fxAt) 가중평균 보존 */
    var map={};
    a.contributions.forEach(function(c){
      if(!c||!c.date)return;
      var bid=(c.b&&brokerIds[c.b])?c.b:firstBid;
      var cc=(c.ccy==="USD")?"USD":"KRW";
      var k=String(c.date).slice(0,7)+"|"+bid+"|"+cc;
      var amt=(typeof c.amount==="number"&&!isNaN(c.amount)?c.amount:0);
      if(!map[k])map[k]={id:uid(),date:c.date,amount:0,b:bid,ccy:cc,_fxw:0};
      map[k].amount+=amt;
      if(cc==="USD"){
        var rate=(typeof c.fxAt==="number"&&c.fxAt>0)?c.fxAt:0;   // 없으면 0 → 나중에 현재환율 폴백
        map[k]._fxw+=amt*rate;
      }
      if(c.date<map[k].date)map[k].date=c.date;
    });
    a.contributions=Object.keys(map).map(function(k){
      var c=map[k];
      if(c.ccy==="USD"){
        c.fxAt=(c._fxw>0&&c.amount>0)?(c._fxw/c.amount):0;   // 가중평균 환율 (0이면 미기록)
      }
      delete c._fxw;
      return c;
    }).filter(function(c){return c.amount>0;})
      .sort(function(x,y){return x.date<y.date?-1:1;});
    delete a.deployedYM;
  });
  return st;
}

/* Yahoo Finance 를 프록시 경유로 호출(브라우저 CORS 우회).
   기본은 공개 프록시, 시세 설정에서 Cloudflare Worker 주소를 넣으면 우선 사용. */
var PUBLIC_PROXIES=["https://api.allorigins.win/raw?url=","https://api.codetabs.com/v1/proxy/?quest="];
var WORKER_CODE='export default {\n'
  +'  async fetch(req) {\n'
  +'    const cors = { "Access-Control-Allow-Origin": "*", "Access-Control-Allow-Methods": "GET,OPTIONS" };\n'
  +'    if (req.method === "OPTIONS") return new Response(null, { headers: cors });\n'
  +'    const t = new URL(req.url).searchParams.get("url");\n'
  +'    if (!t) return new Response("missing url", { status: 400, headers: cors });\n'
  +'    const h = { "User-Agent": "Mozilla/5.0" };\n'
  +'    if (t.includes("naver.com")) h["Referer"] = "https://finance.naver.com/";\n'
  +'    const r = await fetch(t, { headers: h });\n'
  +'    return new Response(r.body, { status: r.status, headers: { ...cors, "Content-Type": "application/json" } });\n'
  +'  }\n'
  +'};';
function proxyBases(){
  if(state&&state.proxyUrl){
    var u=state.proxyUrl.trim();
    if(u){
      if(!/[?&](url|quest)=$/.test(u)) u+=(u.indexOf("?")>=0?"&":"?")+"url=";
      return [u].concat(PUBLIC_PROXIES);
    }
  }
  return PUBLIC_PROXIES;
}
function proxyFetchJson(targetUrl){
  var bases=proxyBases(),i=0;
  function step(){
    if(i>=bases.length) return Promise.reject(new Error("proxy failed"));
    var base=bases[i++];
    var ctrl=(typeof AbortController!=="undefined")?new AbortController():null;
    var timer=ctrl?setTimeout(function(){ctrl.abort();},8000):null;
    var opts=ctrl?{signal:ctrl.signal}:{};
    return fetch(base+encodeURIComponent(targetUrl),opts).then(function(r){
      if(!r.ok) throw new Error("HTTP "+r.status);
      return r.text();
    }).then(function(txt){
      if(timer)clearTimeout(timer);
      return JSON.parse(txt);
    }).catch(function(e){
      if(timer)clearTimeout(timer);
      return step();
    });
  }
  return step();
}
/* 종목코드 -> Yahoo 심볼 후보. 순수 숫자(한국 종목)면 .KS / .KQ 자동 부착 */
function yahooSymbols(code){
  code=(code||"").trim();
  if(/^\d{4,6}$/.test(code)) return [code+".KS",code+".KQ"];
  return [code];
}
function krDigits(code){var m=String(code||"").trim().match(/^(\d{4,6})(\.(KS|KQ))?$/i);return m?m[1]:null;}
function isKRCode(code){return krDigits(code)!=null;}
/* 어떤 Promise든 ms 후 강제 reject — 프록시가 hang 돼도 갱신이 멈추지 않게 */
function withTimeout(p,ms){
  return new Promise(function(resolve,reject){
    var done=false;
    var t=setTimeout(function(){if(!done){done=true;reject(new Error("timeout"));}},ms);
    p.then(function(v){if(!done){done=true;clearTimeout(t);resolve(v);}},
           function(e){if(!done){done=true;clearTimeout(t);reject(e);}});
  });
}
/* === 네이버 금융 — 국장(코스피·코스닥) 실시간 시세 (야후는 ~20분 지연) ===
   응답 형식 변동에 대비해 여러 필드명을 방어적으로 파싱. 코드는 6자리 숫자. */
function _naverNum(v){
  if(v==null)return null;
  if(typeof v==="number")return v;
  var n=parseFloat(String(v).replace(/[,\s]/g,""));
  return isNaN(n)?null:n;
}
function fetchNaverKR(code){
  var c=String(code).replace(/\D/g,"");
  while(c.length<6)c="0"+c;
  if(c.length!==6)return Promise.reject(new Error("bad KR code"));
  var url="https://polling.finance.naver.com/api/realtime/domestic/stock/"+c+"?t="+Date.now();
  return proxyFetchJson(url).then(function(data){
    var d=(data&&data.datas&&data.datas[0])
      ||(data&&data.result&&data.result.areas&&data.result.areas[0]&&data.result.areas[0].datas&&data.result.areas[0].datas[0])
      ||(data&&data.result&&data.result[0])
      ||data;
    if(!d)throw new Error("naver no data");
    var price=_naverNum(d.closePrice!=null?d.closePrice:(d.nv!=null?d.nv:(d.now!=null?d.now:(d.currentPrice!=null?d.currentPrice:d.tradePrice))));
    if(price==null||price<=0)throw new Error("naver no price");
    var name=d.stockName||d.nm||d.itemname||"";
    return {price:price,currency:"KRW",name:name,_src:"naver"};
  });
}
function fetchYahooInfo(symbol){
  var url="https://query1.finance.yahoo.com/v8/finance/chart/"+encodeURIComponent(symbol)
    +"?interval=1d&range=1d&t="+Date.now();
  return proxyFetchJson(url).then(function(d){
    var r=d&&d.chart&&d.chart.result&&d.chart.result[0];
    if(!r||!r.meta||r.meta.regularMarketPrice==null) throw new Error("no price");
    var m=r.meta;
    return {
      price:m.regularMarketPrice,
      currency:(m.currency||"").toUpperCase()||null,   // 'USD' | 'KRW' | ...
      name:m.longName||m.shortName||"",
      _src:"yahoo"
    };
  });
}
function fetchYahooPrice(symbol){return fetchYahooInfo(symbol).then(function(d){return d.price;});}
/* 종목코드 → 시세·통화·이름. 국장(6자리)은 네이버 우선 → 야후(.KS/.KQ) 폴백. 그 외는 야후. */
function fetchCodeInfo(code){
  if(isKRCode(code)){
    return fetchNaverKR(code).then(function(d){d.symbol=String(code).trim();return d;})
      .catch(function(){return fetchYahooHybrid(code);});   // 네이버 실패 → 야후
  }
  return fetchYahooHybrid(code);
}
function fetchYahooHybrid(code){
  var cands=yahooSymbols(code),i=0;
  function step(){
    if(i>=cands.length) return Promise.reject(new Error("not found"));
    var s=cands[i++];
    return fetchYahooInfo(s).then(function(d){d.symbol=s;return d;}).catch(function(){return step();});
  }
  return step();
}
function fetchCodePrice(code){
  return fetchCodeInfo(code).then(function(d){return d.price;});
}
/* USD/KRW 환율 자동 갱신 — Frankfurter → er-api → Yahoo KRW=X 폴백 */
function refreshFx(silent){

  return fetchYahooPrice("KRW=X")
    .then(function(p){if(!ok(p))throw 0;})
    .catch(function(){
      /* 2순위: Frankfurter (ECB 일별 환율, CORS 직통) */
      return fetch("https://api.frankfurter.app/latest?from=USD&to=KRW")
        .then(function(r){if(!r.ok)throw 0;return r.json();})
        .then(function(d){if(!ok(d&&d.rates&&d.rates.KRW))throw 0;});
    })
    .catch(function(){
      /* 3순위: er-api (시간 단위, CORS 직통) */
      return fetch("https://open.er-api.com/v6/latest/USD")
        .then(function(r){if(!r.ok)throw 0;return r.json();})
        .then(function(d){if(!ok(d&&d.rates&&d.rates.KRW))throw 0;});
    })

/* ---- 카드형 빌더 (공용) ---- */
function compColor(i){return SLICE[i%SLICE.length];}
function compBarHTML(stat,cash){
  var total=stat.totalAsset||1;
  var segArr=[];
  stat.rows.forEach(function(r,i){
    if(r.valueKRW<=0)return;
    segArr.push({w:r.valueKRW/total*100,c:compColor(i)});
  });
  if(cash>0)segArr.push({w:cash/total*100,c:"#3a443d"});
  if(!segArr.length)return '<i style="width:100%;background:var(--bg3)"></i>';
  /* 마지막 조각은 flex:1 로 남은 공간을 채워, gap·반올림으로 생기는 오른쪽 회색 틈을 없앰 */
  var segs="";
  segArr.forEach(function(s,i){
    if(i===segArr.length-1){
      segs+='<i style="flex:1 1 auto;min-width:'+s.w.toFixed(2)+'%;background:'+s.c+'"></i>';
    }else{
      segs+='<i style="width:'+s.w.toFixed(4)+'%;flex:0 0 auto;background:'+s.c+'"></i>';
    }
  });
  return segs;
}
function compLegendHTML(stat,cash){
  var total=stat.totalAsset||1,h="";
  stat.rows.forEach(function(r,i){
    if(r.valueKRW<=0)return;
    var badge=r.ccy==="USD"?' <span class="ccytag">USD</span>':"";
    h+='<span class="cl"><span class="dot" style="background:'+compColor(i)+'"></span>'
      +esc(r.h.name||r.h.code||"종목")+badge+' <b>'+pct0(r.valueKRW/total)+'</b></span>';});
  if(cash>0)h+='<span class="cl"><span class="dot" style="background:#3a443d"></span>'
    +'현금 <b>'+pct0(cash/total)+'</b></span>';
  return h||'<span class="note">보유 종목이 없습니다</span>';
}

function contribMetricsHTML(stat){
  var w=stat.sorted.filter(function(c){return c.amount>0;});
  var months={};w.forEach(function(c){months[c.date.slice(0,7)]=1;});
  var nMonths=Object.keys(months).length;
  var total=stat.contributed;   // KRW 환산 (USD는 입금시점 환율)
  return metricHTML("총 납입금","₩"+won(total))
    +metricHTML("납입 개월수",nMonths+"개월")
    +metricHTML("월 평균 납입","₩"+won(nMonths?total/nMonths:0))
    +metricHTML("첫 납입",w[0]?w[0].date.slice(0,7):"—");
}
function viewContrib(acc){
  var stat=calcAccount(acc,state.prices);
  var brokers=acc.brokers||[];
  var multi=brokers.length>1;
  /* 월별·통화별 합계 (KRW / USD 분리) */
  var ymK={},ymU={},ymbK={},ymbU={};
  stat.sorted.forEach(function(c){
    var k=c.date.slice(0,7),cc=(c.ccy==="USD")?"USD":"KRW";
    if(cc==="USD"){ymU[k]=(ymU[k]||0)+c.amount;ymbU[k+"|"+c.b]=(ymbU[k+"|"+c.b]||0)+c.amount;}
    else{ymK[k]=(ymK[k]||0)+c.amount;ymbK[k+"|"+c.b]=(ymbK[k+"|"+c.b]||0)+c.amount;}
  });
  var hasUSD=stat.sorted.some(function(c){return c.ccy==="USD";});
  var w=stat.sorted.filter(function(c){return c.amount>0;});
  var nowY=new Date().getFullYear();
  var minY=w.length?parseInt(w[0].date.slice(0,4),10):nowY;
  var maxY=Math.max(nowY,w.length?parseInt(w[w.length-1].date.slice(0,4),10):nowY);
  var html='<div class="fade">'+bar("입금 내역")
    +'<div class="metrics" id="m_contrib">'+contribMetricsHTML(stat)+'</div>'
    +'<p class="note" style="margin:2px 2px 4px;line-height:1.7">'
    +'입금액을 입력하면 해당 증권계좌의 <b style="color:var(--mint)">예수금</b>에 자동으로 더해집니다.'
    +(hasUSD?' 외화(USD) 입금은 입금 시점 환율로 기록되어 수익률 계산에 반영됩니다.':'')
    +' 매수 후에는 포트폴리오 탭에서 예수금을 실제 잔액으로 수정하세요.</p>';
  /* 한 달 내 입력칸: 단일/멀티 broker × KRW/USD */
  function moneyCell(ym,bid,ccy,val){
    return '<input class="cardinput" data-edit="contrib" data-ym="'+ym+'" data-b="'+bid
      +'" data-ccy="'+ccy+'" inputmode="decimal" value="'+(val?(ccy==="USD"?numFmt(val,2):won(val)):"")
      +'" placeholder="0">';
  }
  function monthBlock(ym2,mm){
    var kAmt=ymK[ym2]||0,uAmt=ymU[ym2]||0;
    var sub=(kAmt?"₩"+won(kAmt):"")+(kAmt&&uAmt?" · ":"")+(uAmt?"$"+numFmt(uAmt,2):"");
    if(!multi){
      var b0=(brokers[0]||{}).id;
      var rows='<div class="ccline"><span class="cclbl">₩</span>'+moneyCell(ym2,b0,"KRW",kAmt)+'</div>';
      if(hasUSD)rows+='<div class="ccline"><span class="cclbl">$</span>'+moneyCell(ym2,b0,"USD",uAmt)+'</div>';
      return '<div class="mrowm"><div class="mrowm-h"><b>'+mm+'월</b>'
        +'<span class="msub" id="ms_'+ym2+'">'+(sub||"—")+'</span></div>'
        +'<div class="mrowm-b ccmonth">'+rows+'</div></div>';
    }
    var binputs=brokers.map(function(b){
      var kk=ymbK[ym2+"|"+b.id]||0,uu=ymbU[ym2+"|"+b.id]||0;
      var inner='<div class="ccline"><span class="cclbl">₩</span>'+moneyCell(ym2,b.id,"KRW",kk)+'</div>';
      if(hasUSD)inner+='<div class="ccline"><span class="cclbl">$</span>'+moneyCell(ym2,b.id,"USD",uu)+'</div>';
      return '<div class="field"><div class="fl">'+esc(b.name)+'</div>'+inner+'</div>';
    }).join("");
    return '<div class="mrowm"><div class="mrowm-h"><b>'+mm+'월</b>'
      +'<span class="msub" id="ms_'+ym2+'">'+(sub||"—")+'</span></div>'
      +'<div class="mrowm-b">'+binputs+'</div></div>';
  }
  for(var y=maxY;y>=minY;y--){
    var yK=0,yU=0;
    for(var m=1;m<=12;m++){var ym=y+"-"+(m<10?"0"+m:m);yK+=ymK[ym]||0;yU+=ymU[ym]||0;}
    var ytot=(yK?"₩"+won(yK):"")+(yK&&yU?" · ":"")+(yU?"$"+numFmt(yU,2):"");
    var open=!!ui.openYears[y];
    html+='<div class="ycard">'
      +'<button class="yhead" data-act="toggle-year" data-year="'+y+'">'
      +'<span class="ychev">'+(open?"\u25be":"\u25b8")+'</span>'
      +'<span class="yname">'+y+'년</span>'
      +'<span class="ytotal mono" id="yt_'+y+'">'+(ytot||"—")+'</span></button>';
    if(open){
      var months="";
      for(var mm=1;mm<=12;mm++){var ym2=y+"-"+(mm<10?"0"+mm:mm);months+=monthBlock(ym2,mm);}
      html+='<div class="mgrid multi">'+months+'</div>';
    }
    html+='</div>';
  }
  return html+'</div>';
}
function softContrib(acc){
  var stat=calcAccount(acc,state.prices);
  if(el("m_contrib"))el("m_contrib").innerHTML=contribMetricsHTML(stat);
  var ymK={},ymU={};
  stat.sorted.forEach(function(c){
    var k=c.date.slice(0,7);
    if(c.ccy==="USD")ymU[k]=(ymU[k]||0)+c.amount;else ymK[k]=(ymK[k]||0)+c.amount;
  });
  function fmt(k){
    var kk=ymK[k]||0,uu=ymU[k]||0;
    return (kk?"₩"+won(kk):"")+(kk&&uu?" · ":"")+(uu?"$"+numFmt(uu,2):"")||"—";
  }
  var nodes=document.querySelectorAll('[id^="yt_"]');
  for(var i=0;i<nodes.length;i++){
    var y=nodes[i].id.slice(3),tk=0,tu=0;
    for(var m=1;m<=12;m++){var ym=y+"-"+(m<10?"0"+m:m);tk+=ymK[ym]||0;tu+=ymU[ym]||0;}
    nodes[i].textContent=(tk?"₩"+won(tk):"")+(tk&&tu?" · ":"")+(tu?"$"+numFmt(tu,2):"")||"—";
  }
  var ms=document.querySelectorAll('[id^="ms_"]');
  for(var j=0;j<ms.length;j++)ms[j].textContent=fmt(ms[j].id.slice(3));
}

var _navLast=null,_navPop=false;
function syncNav(){
  var scr=ui.accId+"|"+ui.tab;
  if(_navLast!==null&&_navLast!==scr&&!_navPop){
    try{history.pushState({accId:ui.accId,tab:ui.tab},"");}catch(e){}
  }
  _navLast=scr;
}
window.addEventListener("popstate",function(e){
  var s=e.state;
  if(!s||typeof s!=="object")return;
  ui.accId=s.accId;ui.tab=s.tab||"port";ui.showProxy=false;ui.showBrokers=false;
  _navPop=true;render();_navPop=false;
});
function render(){

        +'화면을 그리는 중 오류가 발생했습니다.<br>'

/* ===================== 이벤트 ===================== */
/* 빈 데이터 또는 예시 계좌만 있는 상태 — 클라우드 자동 백업으로 덮어쓰면 안 되는 상태 */
function isTrivialState(){
  if(!state||!Array.isArray(state.accounts))return true;
  if(state.accounts.length===0)return true;
  /* 예시 계좌(이름이 "예시 계좌", 또는 예시 종목코드 000001/000002만)뿐이면 trivial */
  return state.accounts.every(function(a){
    if(a.name==="예시 계좌")return true;
    var codes=(a.holdings||[]).map(function(h){return String(h.code||"").trim();});
    if(!codes.length)return true;
    return codes.every(function(c){return c==="000001"||c==="000002"||c==="";});
  });
}
function patch(fn){fn();save();}
var undoState=null;   // 복원 직전 상태 스냅샷 (되돌리기용)
function undoRebalance(){
  if(!undoState)return;
  state=undoState;undoState=null;save();render();
  toast("직전 상태로 되돌렸습니다.");
}
/* ===================== Google Drive 자동 백업 =====================
   GIS(Google Identity Services) 토큰 방식 + Drive appDataFolder(앱 전용 숨김 폴더).
   - 1회 연결 후 localStorage(gdrive_linked)에 플래그 → 다음 실행 때 조용히 자동 재연결
   - 데이터 변경 시 디바운스(60초) 자동 백업 + 수동 백업
   - latest.json(항상 최신) 덮어쓰기, 복원 시 그 파일을 읽어 선택 복원 모달로 연결
   scope drive.appdata: 본 앱이 만든 파일만 접근(전체 Drive 권한 아님 → 프라이버시·심사 부담 적음) */
/* 기본 OAuth 클라이언트 ID — SH Portfolio/Pilot Logbook과 동일(본인 Cloud 프로젝트).
   공개돼도 되는 값. 비워두면 설정 모달에서 다른 ID로 교체 가능. */
var GD_DEFAULT_CID="836300793486-tm7ai7ehdllc2031mjev3e248af8mgt1.apps.googleusercontent.com";
var GD_CLIENT_ID="";   // 사용자 지정 ID (없으면 기본값 사용)
var GD={tokenClient:null,linked:false,backingUp:false};
var GD_KEYS={cid:"rebalancer:gdrive_cid",linked:"rebalancer:gdrive_linked",
  tok:"rebalancer:gdrive_tok",exp:"rebalancer:gdrive_exp",auto:"rebalancer:gdrive_auto"};
function gdCid(){return GD_CLIENT_ID||GD_DEFAULT_CID;}
function gdLoadCfg(){
  try{GD_CLIENT_ID=localStorage.getItem(GD_KEYS.cid)||"";}catch(e){}
  try{GD.linked=localStorage.getItem(GD_KEYS.linked)==="1";}catch(e){}
}
function gdReady(){return typeof google!=="undefined"&&google.accounts&&google.accounts.oauth2;}
function gdOnline(){return typeof navigator==="undefined"||navigator.onLine!==false;}
function gdLinked(){return GD.linked&&!!gdCid();}
/* 세션 토큰 — sessionStorage 보관(재로드해도 세션 동안 유지, 새 탭/종료 시 사라짐) */
function gdGetStoredToken(){
  try{
    var t=sessionStorage.getItem(GD_KEYS.tok),e=+sessionStorage.getItem(GD_KEYS.exp)||0;
    if(t&&Date.now()<e-60000)return t;
  }catch(e){}
  return null;
}
function gdSetStoredToken(t,expiresIn){
  try{
    sessionStorage.setItem(GD_KEYS.tok,t);
    sessionStorage.setItem(GD_KEYS.exp,String(Date.now()+(expiresIn?expiresIn*1000:3600000)));
  }catch(e){}
}
function gdClearToken(){try{sessionStorage.removeItem(GD_KEYS.tok);sessionStorage.removeItem(GD_KEYS.exp);}catch(e){}}
function gdConnected(){return !!gdGetStoredToken();}
/* 토큰 클라이언트 초기화 (CLIENT_ID 있을 때만) */
function gdInitClient(){
  if(!gdReady()||!gdCid())return false;
  if(GD.tokenClient)return true;
  try{
    GD.tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:gdCid(),
      scope:"https://www.googleapis.com/auth/drive.appdata",
      callback:function(){}    // 매 요청마다 교체
    });
    return true;
  }catch(e){return false;}
}
/* 토큰 확보 — interactive=true면 동의창, false면 무음(이미 동의했을 때만 성공) */
function gdGetToken(interactive){
  return new Promise(function(resolve,reject){
    var stored=gdGetStoredToken();
    if(stored)return resolve(stored);
    if(!gdInitClient())return reject(new Error("Google 연결을 사용할 수 없습니다. 클라이언트 ID를 확인하세요."));
    GD.tokenClient.callback=function(resp){
      if(resp&&resp.access_token){
        gdSetStoredToken(resp.access_token,resp.expires_in);
        resolve(resp.access_token);
      }else reject(new Error(resp&&resp.error?resp.error:"토큰을 받지 못했습니다."));
    };
    try{
      GD.tokenClient.requestAccessToken({prompt:interactive?"consent":"none"});
    }catch(e){reject(e);}
  });
}
/* 무음 우선 → 실패 시 동의 (사용자 액션에서만 사용) */
function gdGetTokenSmart(){
  return gdGetToken(false).catch(function(){return gdGetToken(true);});
}
/* Drive REST 호출 (fetch + Authorization) */
function gdFetch(url,opts){
  opts=opts||{};opts.headers=opts.headers||{};
  opts.headers.Authorization="Bearer "+gdGetStoredToken();
  return fetch(url,opts);
}
/* appDataFolder 백업 목록 (최신순) — 시점 선택 복원용 */
function gdListBackups(){
  var url="https://www.googleapis.com/drive/v3/files?spaces=appDataFolder"
    +"&fields=files(id,name,modifiedTime,size)&orderBy=modifiedTime desc&pageSize=100"
    +"&q="+encodeURIComponent("name contains 'rebalancer_' and trashed=false");
  return gdFetch(url)
    .then(function(r){if(!r.ok)throw new Error("목록 조회 실패("+r.status+")");return r.json();})
    .then(function(d){return (d.files||[]).filter(function(f){return /^rebalancer_.*\.json$/.test(f.name);});});
}
/* 타임스탬프 파일로 새 백업 생성 (덮어쓰지 않고 누적) */
function gdUploadNew(json){
  var name="rebalancer_"+new Date().toISOString().replace(/[:.]/g,"-")+".json";
  var meta={name:name,parents:["appDataFolder"]};
  var boundary="rbz"+Date.now();
  var body="--"+boundary+"\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n"
    +JSON.stringify(meta)
    +"\r\n--"+boundary+"\r\nContent-Type: application/json\r\n\r\n"+json
    +"\r\n--"+boundary+"--";
  return gdFetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,modifiedTime",
    {method:"POST",headers:{"Content-Type":"multipart/related; boundary="+boundary},body:body})
    .then(function(r){if(!r.ok)throw new Error("업로드 실패("+r.status+")");return r.json();});
}
/* 파일 ID로 내용 다운로드 */
function gdDownloadId(id){
  return gdFetch("https://www.googleapis.com/drive/v3/files/"+id+"?alt=media")
    .then(function(r){if(!r.ok)throw new Error("다운로드 실패("+r.status+")");return r.text();});
}
/* 파일 삭제 (보존 정리용) */
function gdDeleteId(id){
  return gdFetch("https://www.googleapis.com/drive/v3/files/"+id,{method:"DELETE"})
    .then(function(){return true;}).catch(function(){return false;});
}
/* 구버전 단일 latest.json 도 읽을 수 있게 (마이그레이션) */
function gdFindFile(name){
  var q=encodeURIComponent("name='"+name+"' and 'appDataFolder' in parents and trashed=false");
  return gdFetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name,modifiedTime,size)&q="+q)
    .then(function(r){if(!r.ok)throw new Error("목록 조회 실패("+r.status+")");return r.json();})
    .then(function(d){return (d.files&&d.files[0])||null;});
}
/* 연결(최초 동의) — 사용자 액션 */
function gdConnect(){
  if(!gdCid()){gdOpenSetup();return;}
  if(!gdReady()){toast("Google 모듈 로딩 중 — 잠시 후 다시 시도하세요.");return;}
  if(!gdOnline()){toast("오프라인 — 인터넷 연결 후 시도하세요.");return;}
  gdGetTokenSmart().then(function(){
    GD.linked=true;
    try{localStorage.setItem(GD_KEYS.linked,"1");localStorage.setItem(GD_KEYS.auto,"1");}catch(e){}
    render();
    toast("Google 계정이 연결되었습니다.");
    gdBackupNow(true);   // 연결 직후 1회 백업 (토큰 살아있으니 팝업 없음)
  }).catch(function(e){
    toast("연결 실패: "+(e&&e.message||"알 수 없는 오류"));
  });
}
/* 연결 해제 */
function gdDisconnect(){
  var t=gdGetStoredToken();
  if(t&&gdReady()){try{google.accounts.oauth2.revoke(t,function(){});}catch(e){}}
  gdClearToken();
  GD.linked=false;
  try{localStorage.removeItem(GD_KEYS.linked);localStorage.removeItem(GD_KEYS.auto);}catch(e){}
  render();toast("Google 연결을 해제했습니다.");
}
/* 앱 시작 시 무음 자동 재연결 — 이전에 연결했고 온라인이면 팝업 없이 토큰만 갱신.
   무음 실패(동의 만료 등)면 플래그는 유지하고 사용자가 '연결'을 한 번 누르도록 둠. */
/* 앱 시작 시 — 세션에 살아있는 토큰이 있으면 그대로 연결 상태, 없으면 상태만 갱신.
   부팅 때 토큰을 요청하지 않으므로 로그인 창이 깜빡이지 않는다.
   토큰은 실제 백업/복원 시 (또는 자동 백업 시 살아있을 때만) 사용. */
function gdAutoReconnect(){
  /* 부팅 시 화면 깜빡임 방지 — 상태 표시는 설정 탭에서만 갱신.
     연결 상태는 이미 gdLinked/gdConnected로 판단되므로 전체 재렌더 불필요. */
  if(gdConnected())maybeAutoBackup();
  if(ui.tab==="settings")render();   // 설정 화면 보고 있을 때만 상태 반영
}
/* 백업 실행 — 타임스탬프 파일로 새로 저장(시점별 누적) + 최신 30개 보존 */
function gdBackupNow(silent){
  if(!gdLinked()){if(!silent)gdConnect();return Promise.resolve(false);}
  if(GD.backingUp)return Promise.resolve(false);
  if(!gdOnline()){if(!silent)toast("오프라인 — 인터넷 연결 후 백업됩니다.");return Promise.resolve(false);}
  if(silent&&!gdConnected())return Promise.resolve(false);   // 무음 백업은 살아있는 토큰 있을 때만
  if(silent&&isTrivialState()){return Promise.resolve(false);}  // 빈/예시 데이터 자동백업 차단
  var json;try{json=JSON.stringify(state);}catch(e){if(!silent)toast("백업 데이터를 만들 수 없습니다.");return Promise.resolve(false);}
  GD.backingUp=true;if(el("gdState"))render();
  var getTok=silent?gdGetToken(false):gdGetTokenSmart();
  return getTok.then(function(){
    return gdUploadNew(json);
  }).then(function(){
    /* 보존 정리 — 최신 30개만 남기고 삭제 */
    return gdListBackups().then(function(files){
      var extra=files.slice(30);
      return Promise.all(extra.map(function(f){return gdDeleteId(f.id);}));
    }).catch(function(){});
  }).then(function(){
    GD.backingUp=false;
    state.lastBackup=Date.now();state.lastCloudBackup=Date.now();save();
    try{localStorage.setItem(GD_KEYS.auto,"1");localStorage.setItem("rebalancer:gdrive_last",String(Date.now()));}catch(e){}
    if(el("gdState"))render();
    if(!silent)toast("Google 드라이브에 백업했습니다.");
    return true;
  }).catch(function(e){
    GD.backingUp=false;if(el("gdState"))render();
    if(!silent)toast("백업 실패: "+(e&&e.message||"오류"));
    return false;
  });
}
/* 부팅/기회 시 자동 백업 — 살아있는 토큰이 있을 때만(팝업 절대 없음), 마지막 백업 24h 경과 시 */
function maybeAutoBackup(){
  if(!gdLinked()||!gdConnected())return;
  var last=0;try{last=+localStorage.getItem("rebalancer:gdrive_last")||0;}catch(e){}
  if(Date.now()-last<24*3600*1000)return;
  gdBackupNow(true);
}
/* 복원 — 백업 시점 목록을 보여주고 사용자가 고른 시점을 복원 */
function gdRestore(){
  if(!gdOnline()){toast("오프라인 — 인터넷 연결 후 복원하세요.");return;}
  toast("Google 드라이브에서 백업 목록을 불러오는 중…");
  gdGetTokenSmart().then(function(){
    GD.linked=true;
    try{localStorage.setItem(GD_KEYS.linked,"1");localStorage.setItem(GD_KEYS.auto,"1");}catch(e){}
    /* 타임스탬프 백업 + 구버전 latest.json 을 함께 모아 항상 시점 목록으로 보여줌 */
    return Promise.all([
      gdListBackups().catch(function(){return [];}),
      gdFindFile("latest.json").catch(function(){return null;})
    ]);
  }).then(function(res){
    render();
    var files=res[0]||[];
    var legacy=res[1];
    if(legacy){
      /* latest.json 을 목록에 합치기 (중복 아님 — 이름이 다름) */
      legacy._legacy=true;
      files=files.concat([legacy]);
    }
    /* 최신순 정렬 (modifiedTime 기준) */
    files.sort(function(a,b){return (b.modifiedTime||"")<(a.modifiedTime||"")?-1:1;});
    if(!files.length){toast("드라이브에 백업이 없습니다. 먼저 백업하세요.");return;}
    openGdBackupPicker(files);
  }).catch(function(e){
    render();
    toast("복원 실패: "+((e&&e.message)||"오류"));
  });
}
/* 백업 시점 선택 모달 */
function gdBackupLabel(f){
  var d=new Date(f.modifiedTime);
  var p=function(n){return n<10?"0"+n:""+n;};
  var when=(d.getFullYear())+"."+p(d.getMonth()+1)+"."+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes());
  var kb=f.size?Math.max(1,Math.round(+f.size/1024)):null;
  return when+(kb?(" · "+kb+"KB"):"");
}
function openGdBackupPicker(files){
  var rows=files.slice(0,30).map(function(f,i){
    var tag=i===0?'<span class="gdpick-tag">최신</span>':'';
    if(f._legacy)tag='<span class="gdpick-tag legacy">이전 백업</span>';
    return '<button class="gdpick" data-gdpick="'+f.id+'">'
      +'<span class="gdpick-when">'+esc(gdBackupLabel(f))+'</span>'
      +tag+'</button>';
  }).join("");
  modal({title:"백업 시점 선택",
    body:'<p class="mtext" style="line-height:1.6;margin-bottom:10px">복원할 백업 시점을 고르세요. '
      +'선택하면 계좌별 복원 화면으로 넘어갑니다.</p>'
      +'<div class="gdpicklist">'+rows+'</div>',
    okText:null,cancelText:"닫기"});
}
/* 다운로드한 백업 텍스트를 복원 모달로 연결 (공통) */
function gdApplyRestoreText(txt){
  var data=JSON.parse(txt);
  if(!data||!Array.isArray(data.accounts))throw new Error("백업 형식 오류");
  var cons=consolidate(data);
  var savedState=state;state=cons;var trivial=isTrivialState();state=savedState;
  if(trivial){
    confirmModal("백업이 비어 있음",
      "이 백업이 예시 데이터이거나 비어 있습니다. 그래도 복원 화면을 열까요?",
      function(){openRestoreModal(cons);},false,"열기");
    return;
  }
  openRestoreModal(cons);
}

/* 백업 파일 다운로드 (모든 환경에서 동작하는 기본 경로) */
function downloadBackup(json,fname){
  try{
    var blob=new Blob([json],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;a.download=fname;a.rel="noopener";
    document.body.appendChild(a);a.click();
    setTimeout(function(){if(a.parentNode)a.remove();URL.revokeObjectURL(url);},2000);
    state.lastBackup=Date.now();save();
    toast("백업 파일을 저장했습니다. Google 드라이브 앱에서 이 파일을 올려 주세요.");
  }catch(e){
    toast("백업 저장에 실패했습니다. 다시 시도해 주세요.");
  }
}
function exportData(){
  var json;
  try{json=JSON.stringify(state,null,2);}
  catch(e){toast("백업 데이터를 만들 수 없습니다.");return;}
  downloadBackup(json,"rebalancer-backup-"+todayStr()+".json");
}
/* 백업 버튼: 누르면 항상 안내 모달이 떠서 드라이브 공유 또는 파일 저장으로 진행 */
function shareBackup(){
  var fname="rebalancer-backup-"+todayStr()+".json";
  var json;
  try{json=JSON.stringify(state,null,2);}
  catch(e){toast("백업 데이터를 만들 수 없습니다.");return;}
  /* 파일 공유(Web Share)를 지원하는지 확인 */
  var fileShareOK=false;
  try{
    if(navigator.share&&navigator.canShare)
      fileShareOK=navigator.canShare({files:[new File([json],fname,{type:"application/json"})]});
  }catch(e){fileShareOK=false;}
  if(fileShareOK){
    modal({title:"백업",
      body:'<p class="mtext">아래 <b>드라이브로 보내기</b>를 누르면 공유 메뉴가 열립니다. '
        +'거기서 <b>Google 드라이브</b>를 선택하면 백업 파일이 드라이브에 올라갑니다.<br><br>'
        +'공유 메뉴에 드라이브가 없거나 취소하면, 파일이 기기에 저장되니 드라이브 앱에서 직접 올리면 됩니다.</p>',
      okText:"드라이브로 보내기",cancelText:"닫기",
      onOk:function(){
        try{
          navigator.share({files:[new File([json],fname,{type:"application/json"})],title:"리밸런서 백업"})
            .then(function(){state.lastBackup=Date.now();save();toast("백업을 공유했습니다.");})
            .catch(function(err){
              if(err&&err.name==="AbortError"){toast("공유를 취소했습니다.");return;}
              downloadBackup(json,fname);   // 공유 실패 → 파일 저장으로 대체
            });
        }catch(e){downloadBackup(json,fname);}
      }});
  }else{
    /* 공유 미지원(데스크톱·일부 브라우저) → 파일 저장 안내 */
    modal({title:"백업",
      body:'<p class="mtext">이 기기는 앱 간 공유를 지원하지 않습니다. '
        +'<b>파일 저장</b>을 누르면 백업 파일(.json)이 저장되니, '
        +'Google 드라이브에 직접 올려 주세요.</p>',
      okText:"파일 저장",cancelText:"닫기",
      onOk:function(){downloadBackup(json,fname);}});
  }
}

    patch(function(){acc.holdings.forEach(function(h){

        var c=acc.contributions[i];
        if(c.date.slice(0,7)===qym&&c.b===bid&&(c.ccy||"KRW")===ccy){ex=c;break;}}

        if(bid)setC(bid,fields.ccy==="USD"?"USD":"KRW",num(fields.amount));
      }});
  }
  else if(act==="refresh-prices"){refreshPrices(false);}

  else if(act==="rename-broker"){

    var rbk=(acc.brokers||[]).filter(function(b){return b.id===rbid;})[0];
    if(rbk)promptModal("증권계좌 이름 변경","증권사 이름",rbk.name,function(name){
      rbk.name=name;save();render();});}
  else if(act==="del-broker"){

    var dbid=t.getAttribute("data-b");
    var dbk=acc.brokers.filter(function(b){return b.id===dbid;})[0];
    confirmModal("증권계좌 삭제","'"+(dbk?dbk.name:"")+"' 계좌를 삭제합니다. 종목별 매입수량·금액은 삭제되고, 예수금과 입금 내역은 다른 증권계좌로 합쳐집니다. 계속할까요?",function(){
      var keep=acc.brokers.filter(function(b){return b.id!==dbid;});
      var into=keep[0];
      if(into&&dbk)into.cash=(into.cash||0)+(dbk.cash||0);
      (acc.contributions||[]).forEach(function(c){if(c.b===dbid&&into)c.b=into.id;});
      acc.brokers=keep;
      acc.holdings.forEach(function(h){h.lots=(h.lots||[]).filter(function(l){return l.b!==dbid;});});
      consolidate(state);save();render();toast("증권계좌를 삭제했습니다.");
    },true,"삭제");}
  else if(act==="copy-worker"){

function openAddHoldingModal(acc){
  ui.addLookup=null;
  var body='<div class="fl">종목코드 (티커)</div>'
    +'<input class="minput-f" data-mfield="code" placeholder="예: VOO, AAPL, 360750">'

    +'<div class="fl" style="margin-top:6px">통화</div>'
    +'<div class="ccytoggle" data-mfield="ccy" data-val="KRW">'
    +'<button data-ccy="KRW" class="on">₩ KRW</button>'
    +'<button data-ccy="USD">$ USD</button></div>';
  modal({title:"+ 종목 추가",body:body,okText:"추가",onOk:function(val,fields){
    var code=(fields.code||"").trim();
    if(!code){toast("종목코드를 입력하세요.");return;}
    /* 중복 검사: 같은 코드가 이미 이 계좌에 있으면 추가 차단 */
    var dup=acc.holdings.filter(function(h){return (h.code||"").trim().toLowerCase()===code.toLowerCase();})[0];
    if(dup){toast("이미 같은 종목이 있습니다: "+(dup.name||dup.code));return;}
    var ccy=fields.ccy==="USD"?"USD":"KRW";
    var name=(fields.name||"").trim()||code;
    acc.holdings.push({id:uid(),code:code,name:name,ccy:ccy,weight:0,
      lots:(acc.brokers||[]).map(function(b){return {b:b.id,qty:0,cost:0};})});
    state.priceCcy[code]=ccy;
    /* 조회한 시세가 같은 코드면 즉시 반영 — ↻ 시세 누르지 않아도 가격이 보이도록 */
    if(ui.addLookup&&ui.addLookup.code===code&&ui.addLookup.price>0){
      state.prices[code]=ui.addLookup.price;
    }
    ui.addLookup=null;
    save();render();toast("종목을 추가했습니다.");
  }});
}
function modalLookup(){

  info.textContent="조회 중…";

    if(nameIn&&d.name)nameIn.value=d.name;
    var cc=(d.currency==="USD"||d.currency==="KRW")?d.currency:"KRW";
    setCcyToggle(ccyTog,cc);

    ui.addLookup={code:code,price:d.price,currency:cc,name:d.name||""};
    info.innerHTML='<span style="color:var(--mint)">✓</span> '+esc(d.name||code)
      +' · '+cc+' '+(d.currency==="USD"?'$':'₩')+won(Math.round(d.price*100)/100);
  }).catch(function(){
    ui.addLookup=null;
    info.innerHTML='<span style="color:'+C.coral+'">조회 실패</span> — 종목코드를 확인해 보세요.';
  });
}
function setCcyToggle(wrap,val){

  for(var i=0;i<bs.length;i++){

  }
}

    var cbk=(acc.brokers||[]).filter(function(b){return b.id===cbid;})[0];
    if(cbk){
      if(ccc==="USD")cbk.cashUSD=(cbk.cashUSD||0)+(cv-oldAmt);
      else cbk.cashKRW=(cbk.cashKRW||0)+(cv-oldAmt);
    }
    save();softContrib(acc);
    clearTimeout(contribToastTimer);
    contribToastTimer=setTimeout(function(){toast("입금 내역 저장 — 예수금에 반영됨");},700);
    return;}
  if(!acc)return;
  var id=t.getAttribute("data-id");
  var h=acc.holdings.filter(function(x){return x.id===id;})[0];
  if(!h)return;
  if(f==="h-name")h.name=t.value;
  else if(f==="h-code")h.code=t.value;
  else if(f==="lot-qty"){lotFor(h,t.getAttribute("data-b")).qty=Math.max(0,num(t.value));}
  else if(f==="lot-cost"){lotFor(h,t.getAttribute("data-b")).cost=Math.max(0,num(t.value));}
  else if(f==="weight")h.weight=Math.max(0,num(t.value));
  save();softRefresh();
});

/* 백업 불러오기 */
el("importer").addEventListener("change",function(e){
  var file=e.target.files[0];if(!file)return;
  var rd=new FileReader();
  rd.onload=function(){
    el("importer").value="";
    try{
      var data=JSON.parse(rd.result);
      if(!data||typeof data!=="object"||!Array.isArray(data.accounts))
        throw new Error("형식 오류");
      openRestoreModal(consolidate(data));
    }catch(err){toast("올바른 백업 파일이 아닙니다.");}
  };
  rd.readAsText(file);
});
/* 백업에서 복원할 계좌를 골라 받는 모달 */
function openRestoreModal(backup){
  if(!backup.accounts.length){toast("백업에 계좌가 없습니다.");return;}
  var curIds={};state.accounts.forEach(function(a){curIds[a.id]=1;});
  var rows=backup.accounts.map(function(a){
    var tag=curIds[a.id]?'<span class="rtag over">덮어쓰기</span>'
                        :'<span class="rtag new">새 계좌</span>';
    return '<label class="rrow"><input type="checkbox" data-mfield="acc:'+a.id+'" checked>'
      +'<span class="rinfo"><b>'+esc(a.name)+'</b>'
      +'<span class="rsub">종목 '+( (a.holdings||[]).length )+'개 '+tag+'</span></span></label>';
  }).join("");
  modal({title:"백업에서 복원",
    body:'<p class="mtext" style="margin-bottom:9px">되돌릴 계좌를 선택하세요. 선택한 계좌만 '
      +'백업 내용으로 바뀌고, 나머지 계좌는 그대로 유지됩니다.</p>'
      +'<div style="text-align:right;margin-bottom:7px">'
      +'<button class="linkbtn" data-mall>전체 해제</button></div>'
      +'<div class="rwrap">'+rows+'</div>',
    okText:"복원",cancelText:"취소",
    onOk:function(val,fields){
      var ids=[];
      for(var k in fields){if(k.indexOf("acc:")===0&&fields[k])ids.push(k.slice(4));}
      if(!ids.length){toast("선택한 계좌가 없습니다.");return;}
      applyRestore(backup,ids);
    }});
}
function applyRestore(backup,ids){
  undoState=JSON.parse(JSON.stringify(state));
  var pick={};ids.forEach(function(id){pick[id]=1;});
  var idx={};state.accounts.forEach(function(a,i){idx[a.id]=i;});
  var added=0,replaced=0;
  backup.accounts.forEach(function(ba){
    if(!pick[ba.id])return;
    if(idx[ba.id]!==undefined){state.accounts[idx[ba.id]]=ba;replaced++;}
    else{state.accounts.push(ba);added++;}
  });
  // 시세는 현재 값을 우선하고, 없는 종목코드만 백업에서 보강
  if(backup.prices)for(var c in backup.prices){
    if(state.prices[c]===undefined)state.prices[c]=backup.prices[c];
  }
  state=consolidate(state);
  if(!state.accounts.some(function(a){return a.id===ui.accId;}))ui.accId=null;
  save();render();
  toast("복원 완료 — 교체 "+replaced+"개"+(added?", 추가 "+added+"개":""));
}

/* ===================== 시작 ===================== */
var loaded=load();
state=consolidate(loaded||{accounts:[]});   // 데이터 없으면 빈 상태 (예시 자동 생성 안 함)
gdLoadCfg();
if(el("appVer"))el("appVer").textContent=APP_VER;
render();
try{history.replaceState({accId:ui.accId,tab:ui.tab},"");}catch(e){}
/* Google 드라이브 자동 재연결 (이전에 연결한 적 있으면 조용히, 팝업 없음) */
if(typeof gdAutoReconnect==="function"){
  setTimeout(function(){gdAutoReconnect();},700);
  window.addEventListener("online",function(){gdAutoReconnect();});
  window.addEventListener("offline",function(){if(typeof render==="function")render();});
}
/* 좌우 스와이프로 계좌 전환 — 입력/버튼/링크 위 터치는 제외, 수정 모드 중엔 비활성 */
(function(){
  var appEl=el("app");
  if(!appEl||!appEl.addEventListener)return;
  var sx=0,sy=0,sT=0,tracking=false;
  appEl.addEventListener("touchstart",function(e){
    if(ui.editPort)return;
    if(!e.touches||e.touches.length!==1)return;
    var t=e.target;
    if(t&&t.closest&&t.closest("input,textarea,select,button,a,[contenteditable],.lotwrap,.cashrow,.hcrow,.ccline,.mgrid"))return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;sT=Date.now();tracking=true;
  },{passive:true});
  appEl.addEventListener("touchend",function(e){
    if(!tracking)return;
    tracking=false;
    if(ui.editPort)return;
    if(!e.changedTouches||!e.changedTouches[0])return;
    var t=e.changedTouches[0];
    var dx=t.clientX-sx,dy=t.clientY-sy,dt=Date.now()-sT;
    if(dt>700)return;
    if(Math.abs(dx)<60)return;
    if(Math.abs(dx)<Math.abs(dy)*1.6)return;     // 수직 동작 비중 크면 무시
    if(!state.accounts||state.accounts.length<2)return;
    var idx=-1;
    for(var i=0;i<state.accounts.length;i++)if(state.accounts[i].id===ui.accId){idx=i;break;}
    if(idx<0)return;
    var n=state.accounts.length;
    var ni=dx<0?(idx+1)%n:(idx-1+n)%n;
    ui.accId=state.accounts[ni].id;
    render();
    /* 활성 pill을 화면 안으로 스크롤 (긴 pill 행에서 사라지지 않도록) */
    setTimeout(function(){
      var pill=el("pills")&&el("pills").querySelector(".pill.on");
      if(pill&&pill.scrollIntoView)pill.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
    },10);
  },{passive:true});
})();

/* ===== 당겨서 새로고침 (pull-to-refresh) =====
   페이지 최상단(scrollTop=0)에서 아래로 당기면 시세+환율 강제 갱신.
   좌우 스와이프/입력 위에선 무시, 수정 모드·갱신 중엔 비활성. */
(function(){
  if(typeof document==="undefined"||!document.body)return;
  var ind=document.createElement("div");
  ind.className="ptr-ind";
  ind.innerHTML='<span class="ptr-arrow">↓</span><span class="ptr-txt">당겨서 새로고침</span>';
  document.body.appendChild(ind);
  var TH=70;                 // 발동 임계 거리(px)
  var sy=0,sx=0,pulling=false,dist=0,ready=false;
  function scTop(){return window.pageYOffset||document.documentElement.scrollTop||document.body.scrollTop||0;}
  function reset(){pulling=false;dist=0;ready=false;ind.classList.add("anim");ind.classList.remove("ready");ind.style.height="0";}
  window.addEventListener("touchstart",function(e){
    if(ui.editPort||ui.fetching){pulling=false;return;}
    if(!e.touches||e.touches.length!==1){pulling=false;return;}
    if(scTop()>0){pulling=false;return;}
    var t=e.target;
    if(t&&t.closest&&t.closest("input,textarea,select,button,a,[contenteditable],.modal")){pulling=false;return;}
    sy=e.touches[0].clientY;sx=e.touches[0].clientX;pulling=true;dist=0;ready=false;
    ind.classList.remove("anim");
  },{passive:true});
  window.addEventListener("touchmove",function(e){
    if(!pulling)return;
    if(scTop()>0){reset();return;}
    var dy=e.touches[0].clientY-sy, dxAbs=Math.abs(e.touches[0].clientX-sx);
    if(dy<=0){ind.style.height="0";ind.classList.remove("ready");return;}
    if(dxAbs>Math.abs(dy)){pulling=false;ind.style.height="0";return;}   // 가로 동작이면 스와이프에 양보
    var pull=Math.min(64,dy*0.5);
    ind.style.height=pull+"px";
    ready=dy>=TH;
    ind.classList.toggle("ready",ready);
    var txt=ind.querySelector(".ptr-txt");if(txt)txt.textContent=ready?"놓으면 갱신":"당겨서 새로고침";
    if(dy>6&&e.cancelable)e.preventDefault();   // 브라우저 자체 새로고침/바운스 방지
  },{passive:false});
  function release(){
    if(!pulling)return;pulling=false;
    ind.classList.add("anim");
    if(ready&&!ui.fetching){
      var arrow=ind.querySelector(".ptr-arrow"),txt=ind.querySelector(".ptr-txt");
      if(arrow)arrow.outerHTML='<span class="ptr-spin"></span>';
      if(txt)txt.textContent="갱신 중…";
      ind.style.height="44px";ind.classList.remove("ready");
      refreshPrices(false);   // 시세+환율 강제 갱신 (토스트 표시)
      var close=setInterval(function(){
        if(!ui.fetching){
          clearInterval(close);
          ind.style.height="0";
          setTimeout(function(){ind.innerHTML='<span class="ptr-arrow">↓</span><span class="ptr-txt">당겨서 새로고침</span>';},250);
        }
      },200);
    }else{reset();}
  }
  window.addEventListener("touchend",release,{passive:true});
  window.addEventListener("touchcancel",reset,{passive:true});
})();

/* 앱 열 때 시세 자동 갱신 (최근 10분 내 갱신했으면 생략) */
if(!state.lastFetch||(Date.now()-state.lastFetch>600000)){
  setTimeout(function(){refreshPrices(true);},400);
}else{
  /* 시세는 신선해도 환율은 별도로 — 마지막 환율 갱신이 5분 이상 지났으면 백그라운드로 끌어옴 */
  if(!state.fxUpdated||(Date.now()-state.fxUpdated>300000)){
    setTimeout(function(){refreshFx(true).then(softFx);},500);
  }
}
/* 환율 주기 자동 갱신: 5분마다 (앱이 보일 때만), 백그라운드 복귀 시 즉시 */
setInterval(function(){
  if(typeof document!=="undefined"&&document.hidden)return;
  refreshFx(true).then(softFx);
},5*60*1000);
if(typeof document!=="undefined"&&document.addEventListener){
  document.addEventListener("visibilitychange",function(){
    if(document.hidden)return;
    if(!state.fxUpdated||(Date.now()-state.fxUpdated>60000)){
      refreshFx(true).then(softFx);
    }
  });
}

if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});}
